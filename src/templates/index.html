<!DOCTYPE html>
<html>
<head>
    <title>fernando</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, maximum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#0d2848">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" sizes="128x128" href="/static/icons/fernando-128.png">
    <link rel="apple-touch-icon" href="/static/icons/fernando-512.png">
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js" integrity="sha384-pcBjnGbkyKeOXaoFkmJiuR9E08/6gkmus6/Strimnxtl3uk0Hx23v345pWyC/MMr" crossorigin="anonymous"></script>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js" integrity="sha384-/KNQL8Nu5gCHLqwqfQjA689Hhoqgi2S84SNUxC3roTe4EhJ9AfLkp8QiQcU8AMzI" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm@5.1.0/lib/xterm.min.js" integrity="sha384-oSLfJWgcKdFR8ARaFNNT3eS7AVclV2nA1uRLQ1eJhgXWEF+NA7DyMoU1Go+Qk3SP" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.7.0/lib/xterm-addon-fit.min.js" integrity="sha384-dSvoEq1wDH6yHh7QfeqGKs0/rMUW6IKuS+qUJircrP1EjyEYzCNSbOwyNke0LJKr" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-web-links@0.8.0/lib/xterm-addon-web-links.min.js" integrity="sha384-TVzaokuUch3eGijLx1zm+7pqRcHTDMwgTnENVapK5RqBvXS7Cb6PjpZn+mgOJTO7" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.1.0/css/xterm.css" integrity="sha384-3K5+KOWDosY1TkoDWxPkGjncHOU5L57iOnkapqUQ7lPzlNYDE05ADJlUh4iRvtqu" crossorigin="anonymous" />
    <link rel="stylesheet" href="/static/css/index.css">
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-left">
            <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
            <span class="top-bar-title">fernando</span>
        </div>
        <div>
            <button id="kbdBtn" onclick="toggleKasmKeyboard(); this.blur()">⌨</button>
            <button id="resizeBtn" onclick="doFit(); this.blur()">⤢</button>
            <button onclick="toggleSplit()">Split</button>
        </div>
    </div>
    <div class="content-wrapper">
        <div class="sidebar" id="sidebar">
            <div class="sidebar-header">fernando</div>
            <div class="session-list" id="sessionList">
                <div class="session-item" data-session="desktop">
                    <span class="session-name">Desktop</span>
                    <button class="close-btn" onclick="event.stopPropagation(); restartDesktop()"><svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 8a6 6 0 0 1 10.3-4.1"/><path d="M14 8a6 6 0 0 1-10.3 4.1"/><polyline points="2 2 2 6 6 6"/><polyline points="14 14 14 10 10 10"/></svg></button>
                </div>
                <div class="session-item" data-session="notes" onclick="toggleNotes(); if(window.innerWidth<=500) document.getElementById('sidebar').classList.remove('open')">
                    <span class="session-name">Notes</span>
                </div>
                {% for session in sessions %}
                <div class="session-item" data-session="{{ session }}">
                    <span class="session-name">{{ session }}</span>
                    <button class="close-btn" onclick="closeSession(event, '{{ session }}')"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button>
                </div>
                {% endfor %}
            </div>
            <div class="sidebar-fade"></div>
            <input type="text" id="archiveSearch" class="archive-search" placeholder="Search archived…" oninput="filterArchived()" style="display:none">
            <div class="archive-switch" id="archivedToggleBtn" onclick="toggleArchivedInline()">
                <span class="archive-switch-label active" id="switchLabelActive">Active</span>
                <span class="archive-switch-label" id="switchLabelArchived">Archived</span>
            </div>
            <div class="new-session">
                <button onclick="openNewSessionModal()">New Session</button>
                <button onclick="openAutomationPanel()">Automation</button>
            </div>
        </div>
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>

        <div class="main-content">
            <div class="terminals-wrapper">
                <div class="terminal-container active" id="terminal1-container">
                    <div class="terminal" id="terminal1"></div>
                    <div class="browser-pane hidden" id="browser1"></div>
                </div>
                <div class="terminal-container hidden" id="terminal2-container">
                    <div class="terminal" id="terminal2"></div>
                    <div class="browser-pane hidden" id="browser2"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="newSessionModal" onclick="closeNewSessionModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <div class="modal-header">New Session</div>
            <div class="modal-body">
                <div class="session-cards">
                    <div class="session-card" onclick="createSessionType('shell')">
                        <div class="session-card-title">Shell</div>
                        <div class="session-card-desc">Standard bash shell</div>
                    </div>
                    <div class="session-card" onclick="createSessionType('kiro')">
                        <div class="session-card-title">Kiro</div>
                        <div class="session-card-desc">Kiro CLI interactive mode</div>
                    </div>
                    <div class="session-card" onclick="createSessionType('kiro-unchained')">
                        <div class="session-card-title">Kiro Unchained</div>
                        <div class="session-card-desc">Kiro CLI chat agent mode</div>
                    </div>
                    <div class="session-card" onclick="createChatSession()">
                        <div class="session-card-title">Kiro Chat</div>
                        <div class="session-card-desc">Graphical chat UI (ACP)</div>
                    </div>
                </div>
                <button class="modal-close" onclick="closeNewSessionModal()">Cancel</button>
            </div>
        </div>
    </div>

    <div class="panel-overlay" id="automationOverlay" onclick="closeAutomationPanel()"></div>
    <div class="sa-panel" id="automationPanel">
        <div class="sa-panel-header">
            <span>Automation</span>
            <button class="sa-panel-close" onclick="closeAutomationPanel()"><svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></button>
        </div>
        <div class="sa-panel-tabs">
            <button class="auto-tab active" onclick="switchAutoTab('rules',this)">Rules</button>
            <button class="auto-tab" onclick="switchAutoTab('subagents',this)">Subagents</button>
            <button class="auto-tab" onclick="switchAutoTab('history',this)">History</button>
            <button class="auto-tab" onclick="switchAutoTab('create',this)">+ New</button>
            <button class="auto-tab" onclick="switchAutoTab('policy',this)">Policy</button>
        </div>
        <div class="sa-panel-body">
            <div class="auto-tab-content active" id="autoTabRules">
                <div id="automationRulesList"></div>
            </div>
            <div class="auto-tab-content" id="autoTabSubagents">
                <div id="automationSubagentsList"></div>
            </div>
            <div class="auto-tab-content" id="autoTabHistory">
                <div id="automationHistoryList"></div>
            </div>
            <div class="auto-tab-content" id="autoTabCreate">
                <div style="margin-bottom:14px">
                    <label class="sa-form-label">Name (optional)</label>
                    <input type="text" id="autoRuleName" class="sa-input">
                </div>
                <div style="margin-bottom:14px">
                    <label class="sa-form-label">Trigger type</label>
                    <select id="autoTriggerType" class="sa-input" onchange="updateTriggerFields()">
                        <option value="immediate">Immediate (run now)</option>
                        <option value="schedule">Schedule (cron/at)</option>
                        <option value="inbound">Inbound (email match)</option>
                    </select>
                </div>
                <div id="autoTriggerFields"></div>
                <button class="sa-btn sa-btn-primary" onclick="createAutomationRule()">Create</button>
            </div>
            <div class="auto-tab-content" id="autoTabPolicy">
                <div id="automationPolicyEditor"></div>
            </div>
        </div>
    </div>

    <div class="mobile-controls" id="mobileControls">
        <button onmousedown="event.preventDefault(); sendKey('\x03', 'ctrl+c')">^C</button>
        <button onmousedown="event.preventDefault(); sendKey('\x1b', 'Escape')">ESC</button>
        <button onmousedown="event.preventDefault(); sendKey('\t', 'Tab')">TAB</button>
        <button onmousedown="event.preventDefault(); sendKey('\x1b[D', 'Left')">←</button>
        <button onmousedown="event.preventDefault(); sendKey('\x1b[A', 'Up')">↑</button>
        <button onmousedown="event.preventDefault(); sendKey('\x1b[B', 'Down')">↓</button>
        <button onmousedown="event.preventDefault(); sendKey('\x1b[C', 'Right')">→</button>
        <input type="text" id="dictationInput" placeholder="Dictate..." autocomplete="off" autocorrect="on" autocapitalize="sentences" spellcheck="true">
    </div>

    <div class="mutate-overlay" id="mutateOverlay">
        <div class="spinner" id="overlaySpinner"></div>
        <div class="dna" id="overlayIcon" style="display:none"></div>
        <div class="label" id="overlayLabel">connecting...</div>
    </div>

    <div class="alert-modal" id="alertModal">
        <div class="alert-modal-content">
            <div class="alert-modal-message" id="alertMessage"></div>
            <div class="alert-modal-buttons" id="alertButtons"></div>
        </div>
    </div>

    <script>window.FERNANDO_API_KEY = '{{ api_key }}';</script>
    <script src="/static/js/core.js"></script>
    <script src="/static/js/terminal.js"></script>
    <script src="/static/js/sessions.js"></script>
    <script src="/static/js/automation.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/mobile.js"></script>
</body>
</html>
