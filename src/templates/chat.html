<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/marked@15.0.12/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js" integrity="sha384-pcBjnGbkyKeOXaoFkmJiuR9E08/6gkmus6/Strimnxtl3uk0Hx23v345pWyC/MMr" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/css/chat.css">
    <script src="/static/js/scroll-pill.js" defer></script>
</head>
<body>
    <div class="chat-header">
        <div class="status" id="status"></div>
        <span id="statusText">Starting...</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <div class="attached-files" id="attachedFiles"></div>
        <span class="uploading-indicator" id="uploadingIndicator" style="display:none">Uploading...</span>
        <div class="input-row">
            <div class="textarea-wrap">
                <textarea id="input" placeholder="Message Fernando..." rows="1" spellcheck="true"></textarea>
                <div id="slashMenu" style="display:none;position:absolute;bottom:100%;left:0;margin-bottom:4px;background:#1e2030;border:1px solid #333a50;border-radius:6px;padding:4px 0;z-index:100;min-width:160px;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:13px;"></div>
                <div class="attach-btn" id="attachBtn" onclick="togglePlusMenu(event)"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg>
                    <div class="plus-menu" id="plusMenu">
                        <div class="plus-menu-item" onclick="plusMenuAttach()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>File or image</div>
                        <div class="plus-menu-item" onclick="plusMenuTool()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>Tool call</div>
                    </div>
                </div>
                <input type="file" id="fileInput" multiple style="display:none" onchange="handleFiles(this.files)">
            </div>
            <button type="button" id="sendBtn" tabindex="-1" class="disabled" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <div class="tool-modal-overlay" id="toolModalOverlay" onclick="closeToolModal()">
        <div class="tool-modal" onclick="event.stopPropagation()">
            <div class="tool-modal-header">
                <span class="tool-modal-title" id="toolModalTitle">Run Tool</span>
                <span class="tool-modal-close" onclick="closeToolModal()"><svg width="14" height="14" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></span>
            </div>
            <div class="tool-modal-body" id="toolModalBody">
                <div id="toolPickerView">
                    <input type="text" class="tool-search" id="toolSearch" placeholder="Search tools..." oninput="filterTools()" autocapitalize="off" autocorrect="off" spellcheck="true">
                    <div class="tool-list" id="toolList"></div>
                </div>
                <div id="toolExecView" style="display:none">
                    <div class="tool-exec-scroll">
                        <div class="tool-exec-name" id="toolExecName"></div>
                        <div class="tool-exec-desc" id="toolExecDesc"></div>
                        <div class="tool-exec-params" id="toolExecParams"></div>
                        <div class="tool-exec-result" id="toolExecResult" style="display:none">
                            <div class="tool-exec-result-label">Result</div>
                            <div class="tool-exec-result-content" id="toolResultContent"></div>
                        </div>
                    </div>
                    <div class="tool-exec-footer">
                        <button type="button" class="tool-exec-back" onclick="showToolPicker()">Back</button>
                        <button type="button" class="tool-exec-run" id="toolRunBtn" onclick="runSelectedTool()">Run</button>
                        <button type="button" class="tool-exec-attach" id="toolAttachBtn" onclick="attachToolResult()" style="display:none">Attach to message</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js" integrity="sha384-/KNQL8Nu5gCHLqwqfQjA689Hhoqgi2S84SNUxC3roTe4EhJ9AfLkp8QiQcU8AMzI" crossorigin="anonymous"></script>
<script>
    const sessionId = "{{ acp_session_id }}";
    const apiKey = "{{ api_key }}";
    const homeDir = "{{ home_dir }}";
    const agentCwd = "{{ agent_cwd }}";
    let csrfToken = null;
    let isWorking = false;
    let isReady = false;

    // Configure marked for safe rendering
    const renderer = new marked.Renderer();
    renderer.link = ({ href, title, text }) =>
        `<a href="${href}" target="_blank" rel="noopener noreferrer"${title ? ` title="${title}"` : ''}>${text}</a>`;
    marked.setOptions({ breaks: true, gfm: true, renderer });
    DOMPurify.addHook('uponSanitizeAttribute', (node, data) => {
        if (data.attrName === 'sandbox') data.attrValue = 'allow-scripts';
    });
    DOMPurify.addHook('afterSanitizeAttributes', (node) => {
        if (node.tagName === 'A' && node.getAttribute('href')) {
            node.setAttribute('target', '_blank');
            node.setAttribute('rel', 'noopener noreferrer');
        }
    });

    const socket = io({
        path: window.location.pathname.replace(/\/chat\/.*$/, '') + '/socket.io',
        query: { api_key: apiKey },
        transports: ['websocket'],
        reconnection: true,
    });

    let isMutating = false;

    socket.on('mutating', () => { isMutating = true; });

    document.addEventListener('visibilitychange', () => {
        if (!document.hidden && !socket.connected && !isMutating) {
            fetch('/api/auth_check', { headers: { 'X-API-Key': apiKey } })
                .then(r => { if (r.status === 401) window.location.reload(); })
                .catch(() => {});
        }
    });

    socket.on('connected', (data) => {
        csrfToken = data.csrf_token;
        if (historyOffset === 0) setStatus('connecting', 'Loading...');
        socket.emit('acp_subscribe', { csrf_token: csrfToken, session_id: sessionId, history_offset: historyOffset });
    });

    socket.on('disconnect', () => {
        setStatus('connecting', 'Reconnecting...');
    });

    socket.io.on('reconnect', () => {
        // Server will emit 'connected' which triggers re-subscribe above
        setStatus('connecting', 'Reconnecting...');
    });

    // Notify parent on any click so it can focus this pane
    document.addEventListener('mousedown', () => {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'acp-chat-focus', sessionId: sessionId }, '*');
        }
    });

    function setStatus(state, text) {
        document.getElementById('status').className = 'status ' + state;
        document.getElementById('statusText').textContent = text;
        const btn = document.getElementById('sendBtn');
        if (state === 'ready') {
            isReady = true;
            if (document.hasFocus()) {
                document.getElementById('input').focus();
            }
            btn.classList.remove('disabled');
            btn.textContent = 'Send';
            btn.onclick = sendMessage;
            btn.style.background = '';
            btn.style.borderColor = '';
        } else if (state === 'working') {
            btn.classList.remove('disabled');
            btn.textContent = 'Stop';
            btn.onclick = stopGeneration;
            btn.style.background = '#a03030';
            btn.style.borderColor = '#511414';
        } else if (state === 'error') {
            btn.classList.add('disabled');
            btn.textContent = 'Send';
            btn.onclick = sendMessage;
            btn.style.background = '';
        }
    }

    let _stopClicks = [];
    document.getElementById('sendBtn').addEventListener('pointerdown', function(e) {
        if (this.textContent !== 'Stop') return;
        e.preventDefault();
        const now = Date.now();
        _stopClicks.push(now);
        _stopClicks = _stopClicks.filter(t => now - t < 5000);
        if (_stopClicks.length >= 3) {
            _stopClicks = [];
            setStatus('working', 'Force stopping...');
            socket.emit('acp_force_unstick', { csrf_token: csrfToken, session_id: sessionId });
            return;
        }
    });
    function stopGeneration() {
        document.getElementById('sendBtn').blur();
        if (!isWorking) return;
        // Kill any active pipeline subprocesses so the MCP server unblocks
        for (const widget of Object.values(_pipelines)) {
            if (widget.querySelector('.pw-step.running')) {
                const pid = widget.dataset.pipelineId;
                if (pid) cancelPipeline(pid);
            }
        }
        // Kill any active run_command subprocesses
        fetch('/api/cancel_commands', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
        });
        socket.emit('acp_cancel', { csrf_token: csrfToken, session_id: sessionId });
    }

    // Stall detection: if no acp_event for 90s while working, show diagnostic info
    let stallTimer = null;
    let stallCount = 0;
    function resetStallTimer() {
        stallCount = 0;
        if (stallTimer) clearInterval(stallTimer);
        stallTimer = null;
        if (isWorking) {
            stallTimer = setInterval(() => {
                stallCount++;
                const secs = stallCount * 30;
                if (secs >= 90) {
                    socket.emit('acp_stall_info', { csrf_token: csrfToken, session_id: sessionId });
                }
            }, 30000);
        }
    }

    socket.on('acp_stall_info', (data) => {
        if (data.session_id !== sessionId) return;
        const ago = Math.round(data.last_activity_secs_ago);
        const statusEl = document.getElementById('statusText');
        if (ago > 90 && isWorking) {
            statusEl.innerHTML = `Stalled (${ago}s no data, proc=${data.proc_alive ? 'alive' : 'dead'}) ` +
                `<a href="#" onclick="forceUnstick();return false" style="color:#f44747;text-decoration:underline">Force restart</a>`;
        }
    });

    socket.on('acp_current_model', (data) => {
        if (data.session_id !== sessionId) return;
        addSystemMessage('Current model: ' + (data.model || 'unknown'));
    });

    // --- Pipeline / run_steps progress ---
    const _pipelines = {};  // pipeline_id -> DOM element
    const _pwIcons = {
        succeeded: '<svg viewBox="0 0 16 16" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 8 7 12 13 4"/></svg>',
        failed: '<svg viewBox="0 0 16 16" fill="none" stroke-width="2" stroke-linecap="round"><line x1="4" y1="4" x2="12" y2="12"/><line x1="12" y1="4" x2="4" y2="12"/></svg>',
        running: '<svg viewBox="0 0 16 16" fill="none" stroke-width="2" stroke-linecap="round"><path d="M8 2a6 6 0 1 1-6 6"/></svg>',
        pending: '<svg viewBox="0 0 16 16" fill="none" stroke-width="2"><circle cx="8" cy="8" r="5"/></svg>',
        skipped: '<svg viewBox="0 0 16 16" fill="none" stroke-width="2" stroke-linecap="round"><line x1="4" y1="8" x2="12" y2="8"/></svg>',
        cancelled: '<svg viewBox="0 0 16 16" fill="none" stroke-width="2" stroke-linecap="round"><circle cx="8" cy="8" r="5"/><line x1="5.5" y1="5.5" x2="10.5" y2="10.5"/></svg>',
    };

    socket.on('step_progress', (data) => { handleStepProgress(data); });  // legacy fallback

    function handleStepProgress(data) {
        if (data.session_id !== sessionId) return;
        const pid = data.pipeline_id;
        let widget = _pipelines[pid];
        if (!widget) {
            if (!currentAssistantMsg) return;
            if (_chunkRenderPending) _renderCurrentChunk();
            widget = document.createElement('div');
            widget.className = 'pipeline-widget';
            widget.dataset.pipelineId = pid;
            currentAssistantMsg.appendChild(widget);
            _pipelines[pid] = widget;
            widget._expanded = {};
            widget._prevRunning = -1;
            widget._runStartTime = null;
        }
        if (widget._skipAnimating) return;
        if (widget._frozen) return;
        const _isReplay = _suppressScroll;
        const steps = data.steps || [];
        const commands = data.commands || [];
        const timeouts = data.timeouts || [];
        const results = data.results || [];
        const running = data.running_index;
        widget._commands = commands;
        widget._timeouts = timeouts;
        widget._results = results;
        const justCompleted = (widget._prevRunning >= 0 && widget._prevRunning !== running && results[widget._prevRunning]);
        const justCompletedIdx = justCompleted ? widget._prevRunning : -1;
        let completedFromPct = 0;
        if (justCompleted) {
            const elapsed = (Date.now() - widget._runStartTime) / 1000;
            const timeout = timeouts[justCompletedIdx] || 30;
            completedFromPct = Math.min(Math.round((elapsed / timeout) * 100), 95);
        }
        if (running !== widget._prevRunning) {
            widget._prevRunning = running;
            widget._runStartTime = Date.now();
        }

        const existingSteps = widget.querySelectorAll('.pw-step');
        const needsFullRender = existingSteps.length !== steps.length;

        if (!needsFullRender && existingSteps.length > 0) {
            for (let i = 0; i < steps.length; i++) {
                const r = results[i];
                let status = 'pending';
                if (r) { status = r.status; } else if (i === running) { status = 'running'; }
                const stepEl = existingSteps[i];
                const prevStatus = stepEl.dataset.status;
                if (prevStatus === status && status !== 'running') continue;
                stepEl.dataset.status = status;

                const timeoutVal = timeouts[i] || 30;
                const bar = stepEl.querySelector('.pw-bar');
                const iconEl = stepEl.querySelector('.pw-icon');
                const durationEl = stepEl.querySelector('.pw-duration');

                if (status === 'running' && prevStatus !== 'running') {
                    stepEl.className = 'pw-step running';
                    stepEl.style = `--pw-timeout: ${timeoutVal}s`;
                    if (bar) { bar.className = 'pw-bar pw-bar-running'; bar.style.width = '100%'; bar.style.transition = ''; }
                    if (iconEl) iconEl.innerHTML = '<span class="pw-spinner">' + _pwIcons.running + '</span>';
                    if (durationEl) durationEl.textContent = '';
                } else if ((status === 'succeeded' || status === 'failed') && prevStatus === 'running') {
                    stepEl.className = 'pw-step ' + status;
                    stepEl.style = '';
                    if (iconEl) iconEl.innerHTML = _pwIcons[status] || _pwIcons.pending;
                    if (durationEl && r && r.duration != null) durationEl.textContent = r.duration + 's';
                    const elapsed = (Date.now() - widget._runStartTime) / 1000;
                    const stepTimeout = timeouts[i] || 30;
                    const fromPct = Math.min(Math.round((elapsed / stepTimeout) * 100), 95);
                    if (bar && !_isReplay && fromPct < 90) {
                        bar.className = 'pw-bar';
                        bar.style.width = fromPct + '%';
                        requestAnimationFrame(() => {
                            bar.style.transition = 'width 0.25s ease-out';
                            bar.style.width = '100%';
                        });
                    } else if (bar) {
                        bar.className = 'pw-bar';
                        bar.style.transition = '';
                        bar.style.width = '100%';
                    }
                    if (status === 'failed' && bar) bar.style.background = '#552929d1';
                } else if (status === 'skipped') {
                    stepEl.className = 'pw-step skipped';
                    stepEl.style = '';
                    if (bar) { bar.className = 'pw-bar'; bar.style.width = '0%'; bar.style.transition = ''; }
                    if (iconEl) iconEl.innerHTML = _pwIcons.skipped;
                    if (durationEl && r && r.duration != null) durationEl.textContent = r.duration + 's';
                    if (!_isReplay && !widget._hadSkipped) {
                        if (!widget._firstSkipIdx) widget._firstSkipIdx = i;
                        const skippedOffset = i - widget._firstSkipIdx;
                        stepEl.classList.add('pw-skip-hidden');
                        widget._skipReveal = widget._skipReveal || [];
                        widget._skipReveal.push({ index: i, delay: skippedOffset * 80 });
                    }
                }
            }
            const cancelBtn = widget.querySelector('.pw-cancel');
            const isRunning = running >= 0 && results.length < steps.length;
            if (!isRunning && cancelBtn) {
                const prevH = widget.offsetHeight;
                cancelBtn.remove();
                const newH = widget.offsetHeight;
                if (prevH !== newH) {
                    widget.style.height = prevH + 'px';
                    widget.style.transition = 'height 0.3s ease-out';
                    requestAnimationFrame(() => {
                        widget.style.height = newH + 'px';
                        setTimeout(() => { widget.style.height = ''; widget.style.transition = ''; }, 320);
                    });
                }
            }
            if (isRunning && !cancelBtn) {
                const btn = document.createElement('button');
                btn.className = 'pw-cancel';
                btn.textContent = 'Cancel';
                btn.onclick = () => cancelPipeline(pid);
                widget.appendChild(btn);
            }
        } else {
            let html = '';
            for (let i = 0; i < steps.length; i++) {
                const r = results[i];
                let status = 'pending', icon = _pwIcons.pending, duration = '';
                if (r) {
                    status = r.status;
                    icon = _pwIcons[status] || _pwIcons.pending;
                    if (r.duration != null) duration = r.duration + 's';
                } else if (i === running) {
                    status = 'running';
                    icon = _pwIcons.running;
                }
                const timeoutVal = timeouts[i] || 30;
                let styleAttr = status === 'running' ? ` style="--pw-timeout: ${timeoutVal}s"` : '';
                const iconWrap = status === 'running' ? '<span class="pw-spinner">' + icon + '</span>' : icon;
                const expanded = widget._expanded[i];
                const arrowCls = expanded ? 'pw-arrow open' : 'pw-arrow';
                let barWidth = '0%';
                if (status === 'succeeded' || status === 'failed') barWidth = '100%';
                const barClass = status === 'running' ? 'pw-bar pw-bar-running' : 'pw-bar';
                let barStyle = `width:${barWidth}`;
                if (status === 'failed') barStyle += ';background:#552929d1';
                html += `<div class="pw-step ${status}" data-status="${status}"${styleAttr}><div class="pw-step-header" onclick="togglePwStep('${pid}',${i})"><span class="${barClass}" style="${barStyle}"></span><span class="${arrowCls}"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 4 10 8 6 12"/></svg></span><span class="pw-icon">${iconWrap}</span><span class="pw-label">${DOMPurify.sanitize(steps[i])}</span><span class="pw-duration">${duration}</span></div>`;
                if (expanded && commands[i]) {
                    const stdout = r ? (r.stdout || '') : '';
                    const stderr = r ? (r.stderr || '') : '';
                    const output = (stderr ? (stdout + '\n' + stderr).trim() : stdout.trim()) || '(no output)';
                    html += `<div class="pw-detail"><div class="pw-tabs"><div class="pw-tab active" onclick="event.stopPropagation();pwTabSwitch(this,0)">Input</div><div class="pw-tab" onclick="event.stopPropagation();pwTabSwitch(this,1)">Output</div></div><div class="pw-panel active">${DOMPurify.sanitize(commands[i])}</div><div class="pw-panel">${DOMPurify.sanitize(output)}</div></div>`;
                }
                html += `</div>`;
            }
            const isRunning = running >= 0 && results.length < steps.length;
            if (isRunning) {
                html += `<button class="pw-cancel" onclick="cancelPipeline('${pid}')">Cancel</button>`;
            }
            const prevHeight = _isReplay ? 0 : widget.offsetHeight;
            widget.innerHTML = html;
            const newHeight = _isReplay ? 0 : widget.offsetHeight;
            if (prevHeight && newHeight && prevHeight !== newHeight) {
                widget.style.height = prevHeight + 'px';
                widget.style.transition = 'height 0.35s ease-out';
                requestAnimationFrame(() => {
                    widget.style.height = newHeight + 'px';
                    setTimeout(() => {
                        widget.style.height = '';
                        widget.style.transition = '';
                        scrollToBottom();
                    }, 370);
                });
            }
        }
        if (widget._skipReveal && widget._skipReveal.length) {
            widget._skipAnimating = true;
            const stepEls = widget.querySelectorAll('.pw-step');
            widget._skipReveal.forEach(({ index, delay }) => {
                const el = stepEls[index];
                if (el) {
                    setTimeout(() => {
                        el.classList.add('pw-skip-animating');
                        el.classList.remove('pw-skip-hidden');
                    }, delay);
                }
            });
            widget._skipReveal = null;
        }
        if (results.some(r => r && r.status === 'skipped')) widget._hadSkipped = true;
        scrollToBottom();
    }

    function pwTabSwitch(tabEl, panelIndex) {
        const detail = tabEl.closest('.pw-detail');
        const tabs = detail.querySelectorAll('.pw-tab');
        const panels = detail.querySelectorAll('.pw-panel');
        tabs.forEach(t => t.classList.remove('active'));
        panels.forEach(p => p.classList.remove('active'));
        tabEl.classList.add('active');
        if (panels[panelIndex]) panels[panelIndex].classList.add('active');
    }

    function togglePwStep(pipelineId, index) {
        const widget = _pipelines[pipelineId];
        if (!widget) return;
        widget._expanded[index] = !widget._expanded[index];
        const step = widget.querySelectorAll('.pw-step')[index];
        if (!step) return;
        const arrow = step.querySelector('.pw-arrow');
        if (widget._expanded[index]) {
            if (arrow) arrow.classList.add('open');
            const d = document.createElement('div');
            d.className = 'pw-detail';
            const cmd = (widget._commands || [])[index] || '';
            const r = (widget._results || [])[index];
            const stdout = r ? (r.stdout || '') : '';
            const stderr = r ? (r.stderr || '') : '';
            const output = stderr ? (stdout + '\n' + stderr).trim() : stdout.trim();
            const tabs = document.createElement('div');
            tabs.className = 'pw-tabs';
            const tabIn = document.createElement('div');
            tabIn.className = 'pw-tab active';
            tabIn.textContent = 'Input';
            const tabOut = document.createElement('div');
            tabOut.className = 'pw-tab';
            tabOut.textContent = 'Output';
            tabs.appendChild(tabIn);
            tabs.appendChild(tabOut);
            const panelIn = document.createElement('div');
            panelIn.className = 'pw-panel active';
            panelIn.textContent = cmd;
            const panelOut = document.createElement('div');
            panelOut.className = 'pw-panel';
            panelOut.textContent = output || '(no output)';
            tabIn.addEventListener('click', (e) => { e.stopPropagation(); tabIn.classList.add('active'); tabOut.classList.remove('active'); panelIn.classList.add('active'); panelOut.classList.remove('active'); });
            tabOut.addEventListener('click', (e) => { e.stopPropagation(); tabOut.classList.add('active'); tabIn.classList.remove('active'); panelOut.classList.add('active'); panelIn.classList.remove('active'); });
            d.appendChild(tabs);
            d.appendChild(panelIn);
            d.appendChild(panelOut);
            step.appendChild(d);
        } else {
            if (arrow) arrow.classList.remove('open');
            const detail = step.querySelector('.pw-detail');
            if (detail) detail.remove();
        }
    }

    function cancelPipeline(pipelineId) {
        const widget = _pipelines[pipelineId];
        if (widget) {
            widget._frozen = true;
            for (const stepEl of widget.querySelectorAll('.pw-step.running')) {
                stepEl.className = 'pw-step cancelled';
                stepEl.style = '';
                stepEl.dataset.status = 'cancelled';
                const bar = stepEl.querySelector('.pw-bar');
                if (bar) { bar.className = 'pw-bar'; bar.style.width = '0%'; bar.style.transition = ''; }
                const iconEl = stepEl.querySelector('.pw-icon');
                if (iconEl) iconEl.innerHTML = _pwIcons.cancelled;
            }
            for (const stepEl of widget.querySelectorAll('.pw-step.pending')) {
                stepEl.className = 'pw-step cancelled';
                stepEl.dataset.status = 'cancelled';
                const iconEl = stepEl.querySelector('.pw-icon');

    window.respondAuth = async function(sid, action, approved, btn) {
        const overlay = btn.closest('.auth-modal-overlay');
        const reasonInput = overlay.querySelector('.auth-reason-input');
        const reason = reasonInput ? reasonInput.value.trim() : '';
        const autoApproveBox = overlay.querySelector('.auth-auto-approve');
        const autoApprove = autoApproveBox ? autoApproveBox.checked : false;
        const buttons = overlay.querySelectorAll('button');
        buttons.forEach(b => { b.disabled = true; b.style.opacity = '0.4'; b.style.pointerEvents = 'none'; });
        btn.style.opacity = '1';
        btn.innerHTML = '<span class="auth-dots"><span>.</span><span>.</span><span>.</span></span>';
        let success = false;
        for (let attempt = 0; attempt < 3; attempt++) {
            try {
                const res = await fetch('/api/authorization/grant', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'X-API-Key': apiKey},
                    body: JSON.stringify({session_id: sid, action: action, approved: approved, deny_reason: reason, auto_approve: autoApprove}),
                });
                if (res.ok) { success = true; break; }
            } catch(e) {}
            await new Promise(r => setTimeout(r, 1000));
        }
        if (success) {
            overlay.remove();
            const text = (approved ? '\u2713 Approved' : '\u2717 Denied') + ': ' + action + (reason ? ' \u2014 ' + reason : '');
            addSystemMessage(text);
            socket.emit('acp_system_message', {csrf_token: csrfToken, session_id: sid, text: text});
        } else {
            buttons.forEach(b => { b.disabled = false; b.style.opacity = '1'; b.style.pointerEvents = ''; });
            btn.textContent = approved ? 'Approve' : 'Deny';
            const errMsg = overlay.querySelector('.auth-error');
            if (errMsg) errMsg.remove();
            const err = document.createElement('div');
            err.className = 'auth-error';
            err.style.cssText = 'color:#f55;font-size:12px;margin-top:8px;text-align:center;';
            err.textContent = 'Failed to send. Check connection and try again.';
            btn.closest('div').after(err);
        }
    };

    let _chunkRenderPending = false;
    function _renderCurrentChunk() {
        _chunkRenderPending = false;
        if (!currentContentDiv) return;
        // Override John Gruber's incorrect opinion that your newlines don't matter.
        // Markdown collapses multiple blank lines because Gruber decided he knows better
        // than you about how much whitespace you intended. He was wrong. Your newlines
        // are deliberate. Every character you type is deliberate. We preserve them here.
        let preprocessed = currentText.replace(/\n{3,}/g, m => '\n\n' + '<br>'.repeat(m.length - 2) + '\n');
        let html = marked.parse(preprocessed);
        // Rewrite image src attributes to use the file API
        const homePat = new RegExp('src="' + homeDir.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '/(.*?)"', 'g');
        html = html.replace(homePat, 'src="/api/files/$1?api_key=' + apiKey + '&session=' + sessionId + '"');
        html = html.replace(/src="\/tmp\/(.*?)"/g, 'src="/api/files/tmp/$1?api_key=' + apiKey + '&session=' + sessionId + '"');
        // Rewrite markdown image syntax that marked didn't convert
        const mdHomePat = new RegExp('!\\[([^\\]]*)\\]\\((' + homeDir.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '/[^)]+)\\)', 'g');
        html = html.replace(mdHomePat, (m, alt, path) => `<img alt="${alt}" src="/api/files/${path.slice(homeDir.length + 1)}?api_key=${apiKey}&session=${sessionId}">`);
        html = html.replace(/!\[([^\]]*)\]\((\/tmp\/[^)]+)\)/g,
            (m, alt, path) => `<img alt="${alt}" src="/api/files/tmp${path.slice(4)}?api_key=${apiKey}&session=${sessionId}">`);
        html = DOMPurify.sanitize(html);
        currentContentDiv.innerHTML = html;
        scrollToBottom();
    }
    function appendChunk(text) {
        ensureContentDiv();

        }
        _scheduleCanvasActivation();
    }

    // --- Thinking (agent_thought_chunk) rendering ---
    // Thought chunks stream just like message chunks but render into a separate,
    // collapsible block that lives inside the assistant turn. Kept open while
    // streaming so the user can watch reasoning progress, then collapsed once the
    // answer (or a tool call) begins. A new block starts for each reasoning segment.
    function ensureThoughtBlock() {
        if (currentThoughtBody) return currentThoughtBody;
        ensureAssistantMsg();
        // Start a fresh answer content div after this thought so multi-cycle turns
        // (think -> answer -> think -> answer) render in chronological order.
        currentContentDiv = null;
        const wrap = document.createElement('div');
        wrap.className = 'thinking-block';
        const header = document.createElement('div');
        header.className = 'thinking-header';
        const arrow = document.createElement('span');
        arrow.className = 'thinking-arrow';
        arrow.textContent = '▼';
        const title = document.createElement('span');
        title.className = 'thinking-title';
        title.textContent = 'Thinking';
        header.appendChild(arrow);
        header.appendChild(title);
        const body = document.createElement('div');
        body.className = 'thinking-body';
        header.addEventListener('click', () => {
            const hidden = body.style.display === 'none';
            body.style.display = hidden ? '' : 'none';
            arrow.textContent = hidden ? '▼' : '▶';
        });
        wrap.appendChild(header);
        wrap.appendChild(body);
        currentAssistantMsg.appendChild(wrap);
        currentThoughtBody = body;
        currentThoughtArrow = arrow;
        currentThoughtText = '';
        return body;
    }

    function appendThought(text) {
        const body = ensureThoughtBlock();
        currentThoughtText += text;
        body.textContent = currentThoughtText;
        scrollToBottom();
    }

    // Collapse and finalize the current thought block (answer or tool is starting,
    // or the turn ended). The next thought chunk will open a new block.
    function closeThought() {
        if (currentThoughtBody) {
            currentThoughtBody.style.display = 'none';
            if (currentThoughtArrow) currentThoughtArrow.textContent = '▶';
        }
        currentThoughtBody = null;
        currentThoughtArrow = null;
        currentThoughtText = '';
    }

    function extractFilePaths(rawInput) {
        if (!rawInput) return [];
        const input = typeof rawInput === 'object' ? rawInput : {};
        // Handle "paths" array (e.g. fs_read) or "path" string
        if (Array.isArray(input.paths)) return input.paths;
        if (typeof input.path === 'string') return [input.path];
        // Try nested in operations array
        if (Array.isArray(input.operations)) {
            const paths = [];
            for (const o of input.operations) {
                if (o.path) paths.push(o.path);
                if (Array.isArray(o.image_paths)) paths.push(...o.image_paths);
            }
            return paths;
        }
        return [];
    }

    function fileUrl(filePath) {
        let p = filePath;
        // Expand ~ to home dir
        if (p.startsWith('~/')) p = homeDir + p.slice(1);
        // Make relative paths absolute using agent cwd
        if (!p.startsWith('/')) p = agentCwd + '/' + p;
        // Strip home prefix for the API route
        const stripped = p.startsWith(homeDir + '/') ? p.slice(homeDir.length + 1) : p.replace(/^\/tmp\//, 'tmp/');
        return '/api/files/' + stripped + '?api_key=' + apiKey + '&session=' + sessionId;
    }

    };

    const IMAGE_EXTS = /\.(png|jpg|jpeg|gif|webp|svg|bmp)$/i;

    function _renderOutPretty(container, obj, raw) {
        // MCP tool results: { items: [{ Json: { content: [...], isError: bool } }] }
        // OR direct fields: { items: [{ Json: { stdout: "...", stderr: "...", exit_status: "..." } }] }
        if (obj && typeof obj === 'object' && Array.isArray(obj.items)) {
            for (const item of obj.items) {
                const json = item.Json || item.json || item;
                const isError = json.isError === true;
                const contentArr = json.content || json.Content;
                if (Array.isArray(contentArr)) {
                    // MCP standard format with content array
                    for (const c of contentArr) {
                        if (c.type === 'image' && c.data) {
                            const img = document.createElement('img');
                            img.src = 'data:' + (c.mimeType || 'image/png') + ';base64,' + c.data;
                            img.style.cssText = 'max-width:100%;border-radius:3px;margin:4px 0';
                            container.appendChild(img);
                        } else {
                            const txt = c.text || c.Text || '';
                            if (!txt) continue;
                            _renderTextField(container, txt, isError);
                        }
                    }
                } else {
                    // Direct fields on Json object (e.g. stdout, stderr, exit_status)
                    for (const [k, v] of Object.entries(json)) {
                        if (k === 'isError') continue;
                        if (v === '' || v === null || v === undefined) continue;
                        const label = document.createElement('div');
                        label.className = 'tc-out-label';
                        if (isError) label.style.color = '#f7768e';
                        label.textContent = k;
                        label.appendChild(createCopyBtn(v));
                        const block = document.createElement('div');
                        block.className = 'tc-out-block';
                        if (isError) block.style.color = '#f7768e';
                        block.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
                        container.appendChild(label);
                        container.appendChild(block);
                    }
                }
            }
            return;
        }
        // Fallback: plain object or string
        if (obj && typeof obj === 'object' && !Array.isArray(obj)) {
            for (const [k, v] of Object.entries(obj)) {
                if (v === '' || v === null || v === undefined) continue;
                const label = document.createElement('div');
                label.className = 'tc-out-label';
                label.textContent = k;
                label.appendChild(createCopyBtn(v));
                const block = document.createElement('div');
                block.className = 'tc-out-block';
                block.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
                container.appendChild(label);
                container.appendChild(block);
            }
        } else {
            const block = document.createElement('div');
            block.className = 'tc-out-block';
            block.textContent = typeof raw === 'string' ? raw : JSON.stringify(raw, null, 2);
            container.appendChild(block);
        }
    }

    function _renderTextField(container, txt, isError) {
        let parsed = null;
        try { parsed = JSON.parse(txt); } catch(e) {}
        if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
            for (const [k, v] of Object.entries(parsed)) {
                if (v === '' || v === null || v === undefined) continue;
                const label = document.createElement('div');
                label.className = 'tc-out-label';
                if (isError) label.style.color = '#f7768e';
                label.textContent = k;
                label.appendChild(createCopyBtn(v));
                const block = document.createElement('div');
                block.className = 'tc-out-block';
                if (isError) block.style.color = '#f7768e';
                block.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
                container.appendChild(label);
                container.appendChild(block);
            }
        } else {
            const block = document.createElement('div');
            block.className = 'tc-out-block';
            if (isError) block.style.color = '#f7768e';
            block.textContent = txt;

    function updateToolCall(toolCallId, status, content, rawOutput) {
        const tc = toolCalls[toolCallId];
        if (!tc) return;
        if (status) {
            tc.statusSpan.className = 'tool-status ' + status;
            tc.statusSpan.textContent = status;
        }
        if ((status === 'completed' || status === 'failed') && tc._bar) {
            const bar = tc._bar;
            const elapsed = (Date.now() - tc._barStart) / 1000;
            const fromPct = Math.min(Math.round((elapsed / tc._barTimeout) * 100), 95);
            const fullWidth = 'calc(100% - 10px)';
            bar.className = 'tc-bar';
            if (fromPct >= 90) {
                bar.style.width = fullWidth;
            } else {
                const fromWidth = `calc(${fromPct}% * (100% - 10px) / 100%)`;
                bar.style.width = ((fromPct / 100) * 100).toFixed(1) + '%';
                requestAnimationFrame(() => {
                    bar.style.transition = 'width 0.25s ease-out';
                    bar.style.width = fullWidth;
                });
            }
            if (status === 'failed') bar.style.background = '#552929d1';
            tc._bar = null;
        }
        if ((status === 'completed' || status === 'failed') && tc._barStart) {
            const dur = ((Date.now() - tc._barStart) / 1000).toFixed(1);
            const durSpan = document.createElement('span');
            durSpan.className = 'tool-duration';
            durSpan.textContent = dur + 's';
            tc.statusSpan.parentNode.insertBefore(durSpan, tc.statusSpan);
            tc._barStart = null;
        }
        if (rawOutput) {
            tc.tcState.rawOutput = rawOutput;
            tc.panelOutPretty.innerHTML = '';
            tc.panelOutRaw.textContent = typeof rawOutput === 'string' ? rawOutput : JSON.stringify(rawOutput, null, 2);
            // Render structured output recursively
            let obj = rawOutput;
            if (typeof obj === 'string') { try { obj = JSON.parse(obj); } catch(e) {} }
            _renderOutPretty(tc.panelOutPretty, obj, rawOutput);
        }
        // Render attach_file output as a downloadable chip
        if (status === 'completed' && tc.title.includes('attach_file')) {
            try {
                let obj = tc.tcState.rawOutput;
                if (typeof obj === 'string') { try { obj = JSON.parse(obj); } catch(e) {} }
                let out = obj;
                if (typeof out === 'object' && out.items) {
                    const first = (out.items[0] || {}).Json || {};
                    out = JSON.parse(((first.content || [])[0] || {}).text || '{}');
                } else if (typeof out === 'object' && out.content && Array.isArray(out.content)) {
                    out = JSON.parse((out.content[0] || {}).text || '{}');
                } else if (typeof out === 'string') {
                    out = JSON.parse(out);
                }
                if (out.url_path) {
                    const url = '/api/files/' + out.url_path + '?api_key=' + apiKey;
                    const chipWrap = document.createElement('div');
                    chipWrap.className = 'file-chips';
                    chipWrap.style.margin = '6px 0';
                    const a = document.createElement('a');
                    a.className = 'file-chip';
                    a.href = '#';
                    a.innerHTML = CLIP_SVG + '<span>' + escapeHtml(out.name || 'file') + '</span>';
                    a.onclick = (e) => { e.preventDefault(); downloadFile(url, out.name || 'file', a); };
                    chipWrap.appendChild(a);
                    ensureAssistantMsg();
                    if (_chunkRenderPending) _renderCurrentChunk();
                    currentContentDiv = null;
                    currentText = '';
                    currentAssistantMsg.appendChild(chipWrap);
                }
            } catch(e) {}
        }
        scrollToBottom();
    }

    function finishTurn() {
        // Stop any in-progress pipeline animations (agent was stopped mid-command)
        for (const widget of Object.values(_pipelines)) {
            const runningSteps = widget.querySelectorAll('.pw-step.running');
            const pendingSteps = widget.querySelectorAll('.pw-step.pending');
            if (runningSteps.length === 0 && pendingSteps.length === 0) continue;
            widget._frozen = true;  // Block late step_progress events from overwriting
            for (const stepEl of runningSteps) {
                stepEl.className = 'pw-step cancelled';
                stepEl.style = '';
                stepEl.dataset.status = 'cancelled';
                const bar = stepEl.querySelector('.pw-bar');
                if (bar) { bar.className = 'pw-bar'; bar.style.width = '0%'; bar.style.transition = ''; }
                const iconEl = stepEl.querySelector('.pw-icon');
                if (iconEl) iconEl.innerHTML = _pwIcons.cancelled;
            }
            for (const stepEl of pendingSteps) {
                stepEl.className = 'pw-step cancelled';
                stepEl.dataset.status = 'cancelled';
                const iconEl = stepEl.querySelector('.pw-icon');
                if (iconEl) iconEl.innerHTML = _pwIcons.cancelled;
            }
            const cancelBtn = widget.querySelector('.pw-cancel');
            if (cancelBtn) cancelBtn.remove();
        }
        currentTurnTs = null;
        currentTurnModel = null;
        if (_chunkRenderPending) _renderCurrentChunk();
        if (_canvasTimer) { clearTimeout(_canvasTimer); _canvasTimer = null; }
        _activateCanvases();
        // Detect model list response and render as modal (live only)
        if (_modelListPending && currentText) {
            const lines = currentText.trim().split('\n').filter(l => l.trim());
            const models = [];
            let currentModel = null;
            for (const line of lines) {
                const m = line.match(/^(→)?\s*(\S+)\s+\(\S+\)/);
                if (m) {
                    models.push(m[2]);
                    if (m[1]) currentModel = m[2];
                }
            }
            if (models.length > 1 && currentAssistantMsg) {
                currentAssistantMsg.remove();
                showModelModal(models, currentModel);
            }
            _modelListPending = false;
        }
        for (const tc of Object.values(toolCalls)) {
            if (tc.statusSpan && tc.statusSpan.textContent !== 'completed') {
                if (tc._bar) {
                    const bar = tc._bar;
                    const elapsed = (Date.now() - tc._barStart) / 1000;
                    const timeout = tc._barTimeout || 30;
                    const fromPct = Math.min(Math.round((elapsed / timeout) * 100), 95);
                    bar.className = 'tc-bar';
                    if (fromPct >= 90) {
                        bar.style.width = 'calc(100% - 10px)';
                    } else {
                        bar.style.width = ((fromPct / 100) * 100).toFixed(1) + '%';
                        requestAnimationFrame(() => {
                            bar.style.transition = 'width 0.25s ease-out';
                            bar.style.width = 'calc(100% - 10px)';
                        });
                    }
                    tc._bar = null;
                }
                if (tc._barStart) {
                    const dur = ((Date.now() - tc._barStart) / 1000).toFixed(1);
                    const durSpan = document.createElement('span');
                    durSpan.className = 'tool-duration';
                    durSpan.textContent = dur + 's';
                    tc.statusSpan.parentNode.insertBefore(durSpan, tc.statusSpan);
                    tc._barStart = null;
                }
                tc.statusSpan.className = 'tool-status completed';
                tc.statusSpan.textContent = 'completed';
            }
        }
        if (currentAssistantMsg) {
            collapseCodeBlocks(currentAssistantMsg, 30);
            highlightDiffs(currentAssistantMsg);
        }
        currentAssistantMsg = null;
        currentContentDiv = null;
        currentText = '';
        closeThought();
        toolCalls = {};
        isWorking = false;
        setStatus('ready', 'Ready');
        resetStallTimer();
    }

    function renderUserText(text) {
        // Split on fenced code blocks first
        const parts = text.split(/(```[\s\S]*?```)/g);
        return parts.map((part, i, arr) => {
            if (part.startsWith('```') && part.endsWith('```')) {
                const inner = part.slice(3, -3);
                const nl = inner.indexOf('\n');
                const lang = nl > -1 ? inner.slice(0, nl).trim() : '';
                const code = nl > -1 ? inner.slice(nl + 1) : inner;
                return '<pre><code' + (lang ? ' class="language-' + escapeHtml(lang) + '"' : '') + '>' + escapeHtml(code) + '</code></pre>';
            }
            // Handle blockquotes and inline backticks, escape everything else.
            // Trim the single fence-adjacent newline so code blocks sit flush with text.
            // Intentional blank lines (multiple newlines) are preserved because, unlike
            // John Gruber, we believe you meant what you typed.
            if (i > 0 && arr[i - 1].startsWith('```')) part = part.replace(/^\n/, '');
            if (i < arr.length - 1 && arr[i + 1].startsWith('```')) part = part.replace(/(?<!\n)\n$/, '');
            const rendered = part.split('\n').map(line => {
                const quoteMatch = line.match(/^(>{1,})\s?(.*)/);
                const inner = quoteMatch ? quoteMatch[2] : line;
                const inlineRendered = inner.split(/(`[^`]+`)/g).map(s => {
                    if (s.startsWith('`') && s.endsWith('`')) {
                        return '<code>' + escapeHtml(s.slice(1, -1)) + '</code>';
                    }
                    return escapeHtml(s);
                }).join('');
                return quoteMatch ? '<blockquote>' + inlineRendered + '</blockquote>' : inlineRendered;
            }).join('\n');
            // Remove newlines between/after blockquotes (pre-wrap would show them as extra gaps)
            return rendered.replace(/<\/blockquote>\n<blockquote>/g, '</blockquote><blockquote>')
                .replace(/<\/blockquote>\n/g, '</blockquote>');
        }).join('');
    }

    function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    function collapseCodeBlocks(container, maxLines) {
        container.querySelectorAll('pre code').forEach(code => {
            const lines = code.textContent.split('\n');
            if (lines.length <= maxLines) return;
            const pre = code.parentElement;
            const truncated = lines.slice(0, maxLines).join('\n');
            const full = code.textContent;
            code.textContent = truncated;
            const toggle = document.createElement('div');
            toggle.style.cssText = 'color:#569cd6;cursor:pointer;font-size:12px;margin-top:4px;font-family:sans-serif';
            toggle.textContent = '▶ Show all ' + lines.length + ' lines';
            let expanded = false;
            toggle.onclick = () => {
                expanded = !expanded;
                code.textContent = expanded ? full : truncated;
                if (code.classList.contains('language-diff')) highlightDiffEl(code);
                toggle.textContent = expanded ? '▼ Collapse' : '▶ Show all ' + lines.length + ' lines';
            };
            pre.after(toggle);
        });

    function highlightDiffEl(code) {
        const text = code.textContent;
        code.textContent = '';
        text.split('\n').forEach((line, i, arr) => {
            const span = document.createElement('span');
            if (line.startsWith('+++') || line.startsWith('---')) span.className = 'diff-header';
            else if (line.startsWith('@@')) span.className = 'diff-hunk';
            else if (line.startsWith('+')) span.className = 'diff-add';
            else if (line.startsWith('-')) span.className = 'diff-del';
            else span.className = 'diff-ctx';
            span.textContent = line + (i < arr.length - 1 ? '\n' : '');
            code.appendChild(span);
        });
    }

        container.querySelectorAll('pre code.language-diff').forEach(highlightDiffEl);

    async function downloadFile(url, name, chip) {
        const orig = chip ? chip.textContent : '';
        try {
            if (chip) chip.textContent = 'Loading...';
            const r = await fetch(url);
            if (!r.ok) throw new Error('HTTP ' + r.status);
            const blob = await r.blob();
            if (chip) chip.textContent = orig;
            if (isIOSPWA) {
                const file = new File([blob], name, { type: blob.type || 'application/octet-stream' });
                if (navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({ files: [file] });
                    return;
                }
            }
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(a.href), 1000);
        } catch(e) {
            if (chip) chip.textContent = e.name === 'AbortError' ? orig : 'Error: ' + e.message;
            if (e.name !== 'AbortError') setTimeout(() => { if (chip) chip.textContent = orig; }, 3000);
        }
    }

    const _toolResultRe = /^\[Tool result: ([^\]]+)\]\n([\s\S]*)$/;
    function _renderUserBody(el, text) {
        // Split text into tool result blocks and regular text
        const parts = text.split(/(\[Tool result: [^\]]+\]\n(?:Input:\n```[\s\S]*?```\n)?Output:\n```[\s\S]*?```)/g);
        for (const part of parts) {
            const m = part.match(/^\[Tool result: ([^\]]+)\]\n([\s\S]*)$/);
            if (m) {
                const toolName = m[1];
                const body = m[2];
                // Parse input and output
                let inputText = '';
                let outputText = '';
                const inputMatch = body.match(/^Input:\n```\n([\s\S]*?)\n```\nOutput:\n```\n([\s\S]*?)\n```$/);
                const outputOnly = body.match(/^Output:\n```\n([\s\S]*?)\n```$/);
                if (inputMatch) {
                    inputText = inputMatch[1];
                    outputText = inputMatch[2];
                } else if (outputOnly) {
                    outputText = outputOnly[1];
                } else {
                    outputText = body;
                }
                // Render as tool call widget
                const div = document.createElement('div');
                div.className = 'tool-call';
                const header = document.createElement('div');
                header.className = 'tool-call-header';
                const arrow = document.createElement('span');
                arrow.className = 'arrow';
                arrow.textContent = '▶';
                const nameSpan = document.createElement('span');
                nameSpan.className = 'tool-name';
                nameSpan.textContent = toolName;
                const statusSpan = document.createElement('span');
                statusSpan.className = 'tool-status completed';
                statusSpan.textContent = 'user';
                header.appendChild(arrow);
                header.appendChild(nameSpan);
                header.appendChild(statusSpan);
                const tcBody = document.createElement('div');
                tcBody.className = 'tool-call-body';
                // Tabs
                const tabs = document.createElement('div');
                tabs.className = 'tc-tabs';
                const tabIn = document.createElement('div');
                tabIn.className = 'tc-tab' + (inputText ? ' active' : '');
                tabIn.textContent = 'Input';
                const tabOut = document.createElement('div');
                tabOut.className = 'tc-tab' + (inputText ? '' : ' active');
                tabOut.textContent = 'Output';
                const jsonToggle = document.createElement('div');
                jsonToggle.className = 'tc-json-toggle';
                jsonToggle.textContent = 'JSON';
                tabs.appendChild(tabIn);
                tabs.appendChild(tabOut);
                tabs.appendChild(jsonToggle);
                // Input panel
                const panelIn = document.createElement('div');
                panelIn.className = 'tc-panel' + (inputText ? ' active' : '');
                if (inputText) {
                    try {
                        const parsed = JSON.parse(inputText);

                            const row = document.createElement('div');
                            row.className = 'tc-param';
                            const key = document.createElement('div');

                            key.textContent = k;
