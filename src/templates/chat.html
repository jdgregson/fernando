<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #1e1e1e; color: #d4d4d4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; }

        .chat-header {
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            padding: 8px 16px;
            font-size: 13px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .chat-header .status { width: 8px; height: 8px; border-radius: 50%; background: #888; }
        .chat-header .status.ready { background: #4ec9b0; }
        .chat-header .status.working { background: #dcdcaa; animation: pulse 1s infinite; }
        .chat-header .status.error { background: #f44747; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 0;
            display: flex;
            flex-direction: column;
        }

        .msg {
            width: 100%;
            padding: 14px 20px;
            font-size: 14px;
            line-height: 1.6;
            word-wrap: break-word;
            overflow-wrap: break-word;
            border-bottom: 1px solid #2a2a2a;
        }
        .msg .msg-label {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
            opacity: 0.6;
        }
        .msg.user {
            background: #1a2332;
            white-space: pre-wrap;
        }
        .msg.user .msg-label { color: #569cd6; }
        .msg.assistant {
            background: #1e1e1e;
        }
        .msg.assistant .msg-label { color: #4ec9b0; }
        /* Markdown styles inside assistant messages */
        .msg.assistant p { margin: 0.4em 0; }
        .msg.assistant p:first-child { margin-top: 0; }
        .msg.assistant p:last-child { margin-bottom: 0; }
        .msg.assistant code { background: #1a1a2e; padding: 1px 5px; border-radius: 3px; font-size: 13px; font-family: 'SF Mono', Menlo, Consolas, monospace; }
        .msg.assistant pre { background: #1a1a2e; border: 1px solid #3e3e42; border-radius: 4px; padding: 10px; margin: 8px 0; overflow-x: auto; }
        .msg.assistant pre code { background: none; padding: 0; }
        .msg.assistant ul, .msg.assistant ol { margin: 0.4em 0; padding-left: 1.5em; }
        .msg.assistant h1, .msg.assistant h2, .msg.assistant h3 { margin: 0.6em 0 0.3em; color: #e0e0e0; }
        .msg.assistant h1 { font-size: 1.3em; }
        .msg.assistant h2 { font-size: 1.15em; }
        .msg.assistant h3 { font-size: 1.05em; }
        .msg.assistant a { color: #569cd6; }
        .msg.assistant blockquote { border-left: 3px solid #3e3e42; padding-left: 10px; color: #999; margin: 0.4em 0; }
        .msg.assistant table { border-collapse: collapse; margin: 0.4em 0; }
        .msg.assistant th, .msg.assistant td { border: 1px solid #3e3e42; padding: 4px 8px; }
        .msg.assistant img { max-width: 100%; border-radius: 4px; margin: 6px 0; }

        .tool-call {
            background: #1a1a2e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            margin: 6px 0;
            font-size: 12px;
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            color: #9cdcfe;
            overflow: hidden;
        }
        .tool-call-header {
            padding: 6px 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            user-select: none;
        }
        .tool-call-header:hover { background: #252545; }
        .tool-call-header .arrow { transition: transform 0.15s; font-size: 10px; color: #888; }
        .tool-call-header .arrow.open { transform: rotate(90deg); }
        .tool-call-header .tool-name { color: #dcdcaa; font-weight: bold; }
        .tool-call-header .tool-status { color: #888; font-style: italic; margin-left: auto; }
        .tool-call-header .tool-status.completed { color: #4ec9b0; }
        .tool-call-header .tool-status.failed { color: #f44747; }
        .tool-call-header .tool-status.in_progress { color: #dcdcaa; }
        .tool-call-body {
            display: none;
            padding: 6px 10px;
            border-top: 1px solid #3e3e42;
            white-space: pre-wrap;
            max-height: 300px;
            overflow-y: auto;
            color: #aaa;
            font-size: 11px;
        }
        .tool-call-body.open { display: block; }

        .msg.system {
            align-self: center;
            color: #888;
            font-size: 12px;
            font-style: italic;
        }

        .input-area {
            background: #252526;
            border-top: 1px solid #3e3e42;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            color: #d4d4d4;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 40px;
            max-height: 120px;
        }
        .input-area textarea:focus { border-color: #3465a3; }
        .input-area button {
            background: #3465a3;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            align-self: flex-end;
        }
        .input-area button:hover { background: #4a7bc8; }
        .input-area button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="status" id="status"></div>
        <span id="statusText">Starting...</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <textarea id="input" placeholder="Message Kiro..." rows="1" disabled></textarea>
        <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js" integrity="sha384-/KNQL8Nu5gCHLqwqfQjA689Hhoqgi2S84SNUxC3roTe4EhJ9AfLkp8QiQcU8AMzI" crossorigin="anonymous"></script>
<script>
    const sessionId = "{{ acp_session_id }}";
    const apiKey = "{{ api_key }}";
    let csrfToken = null;
    let isWorking = false;

    // Configure marked for safe rendering
    marked.setOptions({ breaks: true, gfm: true });

    const socket = io({
        path: window.location.pathname.replace(/\/chat\/.*$/, '') + '/socket.io',
        query: { api_key: apiKey },
        reconnection: true,
    });

    socket.on('connected', (data) => {
        csrfToken = data.csrf_token;
        socket.emit('acp_subscribe', { csrf_token: csrfToken, session_id: sessionId });
    });

    // Notify parent on any click so it can focus this pane
    document.addEventListener('mousedown', () => {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'acp-chat-focus', sessionId: sessionId }, '*');
        }
    });

    function setStatus(state, text) {
        document.getElementById('status').className = 'status ' + state;
        document.getElementById('statusText').textContent = text;
        const input = document.getElementById('input');
        const btn = document.getElementById('sendBtn');
        if (state === 'ready') {
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        } else if (state === 'error') {
            input.disabled = true;
            btn.disabled = true;
        }
    }

    let currentAssistantMsg = null;
    let currentText = '';
    let currentContentDiv = null;
    let toolCalls = {};

    function ensureAssistantMsg() {
        if (!currentAssistantMsg) {
            currentText = '';
            currentContentDiv = null;
            currentAssistantMsg = document.createElement('div');
            currentAssistantMsg.className = 'msg assistant';
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = 'Fernando';
            currentAssistantMsg.appendChild(label);
            document.getElementById('messages').appendChild(currentAssistantMsg);
        }
        return currentAssistantMsg;
    }

    function ensureContentDiv() {
        ensureAssistantMsg();
        if (!currentContentDiv) {
            currentText = '';
            currentContentDiv = document.createElement('div');
            currentContentDiv.className = 'msg-content';
            currentAssistantMsg.appendChild(currentContentDiv);
        }
        return currentContentDiv;
    }

    function appendChunk(text) {
        ensureContentDiv();
        currentText += text;
        let html = marked.parse(currentText);
        html = html.replace(/src="\/home\/fernando\/(.*?)"/g, 'src="/files/$1"');
        html = html.replace(/!\[([^\]]*)\]\((\/home\/fernando\/[^)]+)\)/g,
            (m, alt, path) => `<img alt="${alt}" src="/files/${path.replace('/home/fernando/', '')}">`);
        currentContentDiv.innerHTML = html;
        scrollToBottom();
    }

    function appendImage(data, mimeType) {
        ensureContentDiv();
        const img = document.createElement('img');
        img.src = 'data:' + (mimeType || 'image/png') + ';base64,' + data;
        img.style.cssText = 'max-width:100%;border-radius:4px;margin:6px 0';
        currentContentDiv.appendChild(img);
        scrollToBottom();
    }

    function extractFilePaths(rawInput) {
        if (!rawInput) return [];
        const input = typeof rawInput === 'object' ? rawInput : {};
        // Handle "paths" array (e.g. fs_read) or "path" string
        if (Array.isArray(input.paths)) return input.paths;
        if (typeof input.path === 'string') return [input.path];
        // Try nested in operations array
        if (Array.isArray(input.operations)) {
            return input.operations.map(o => o.path).filter(Boolean);
        }
        return [];
    }

    function fileUrl(filePath) {
        return '/files/' + filePath.replace(/^\/home\/fernando\//, '');
    }

    function addToolCall(toolCallId, title, status, rawInput) {
        ensureAssistantMsg();
        // Seal current text so next text appears after this tool call
        currentContentDiv = null;
        currentText = '';
        const div = document.createElement('div');
        div.className = 'tool-call';

        const header = document.createElement('div');
        header.className = 'tool-call-header';

        const arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.textContent = '▶';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'tool-name';
        nameSpan.textContent = title || toolCallId;

        const statusSpan = document.createElement('span');
        statusSpan.className = 'tool-status ' + (status || 'pending');
        statusSpan.textContent = status || 'pending';

        header.appendChild(arrow);
        header.appendChild(nameSpan);
        header.appendChild(statusSpan);

        const body = document.createElement('div');
        body.className = 'tool-call-body';
        if (rawInput) {
            body.textContent = typeof rawInput === 'string' ? rawInput : JSON.stringify(rawInput, null, 2);
        }

        header.addEventListener('click', () => {
            arrow.classList.toggle('open');
            body.classList.toggle('open');
        });

        div.appendChild(header);
        div.appendChild(body);

        // Show image previews for file read tools
        const paths = extractFilePaths(rawInput);
        for (const p of paths) {
            if (IMAGE_EXTS.test(p)) {
                const img = document.createElement('img');
                img.src = fileUrl(p);
                img.style.cssText = 'max-width:100%;max-height:400px;border-radius:4px;margin-top:6px;display:block';
                body.appendChild(img);
                // Auto-expand to show the image
                arrow.classList.add('open');
                body.classList.add('open');
            }
        }

        currentAssistantMsg.appendChild(div);
        toolCalls[toolCallId] = { div, statusSpan, body, title: title || '', rawInput };
        scrollToBottom();
    }

    const IMAGE_EXTS = /\.(png|jpg|jpeg|gif|webp|svg|bmp)$/i;

    function updateToolCall(toolCallId, status, content) {
        const tc = toolCalls[toolCallId];
        if (!tc) return;
        if (status) {
            tc.statusSpan.className = 'tool-status ' + status;
            tc.statusSpan.textContent = status;
        }
        if (content) {
            for (const c of content) {
                if (c.type === 'content' && c.content) {
                    if (c.content.type === 'text') {
                        // Insert text before any images
                        const textNode = document.createTextNode(c.content.text + '\n');
                        const firstImg = tc.body.querySelector('img');
                        if (firstImg) tc.body.insertBefore(textNode, firstImg);
                        else tc.body.appendChild(textNode);
                    }
                }
            }
        }
        if (status === 'completed' && tc.body.textContent.trim()) {
            const lines = tc.body.textContent.trim().split('\n');
            if (lines.length > 20) {
                // Preserve images, truncate text
                const imgs = tc.body.querySelectorAll('img');
                const truncated = lines.slice(0, 20).join('\n') + '\n... (' + lines.length + ' lines total)';
                tc.body.textContent = truncated;
                imgs.forEach(img => tc.body.appendChild(img));
            }
        }
        scrollToBottom();
    }

    function finishTurn() {
        currentAssistantMsg = null;
        currentContentDiv = null;
        currentText = '';
        toolCalls = {};
        isWorking = false;
        setStatus('ready', 'Ready');
    }

    function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    function scrollToBottom() {
        const m = document.getElementById('messages');
        m.scrollTop = m.scrollHeight;
    }

    function addUserMessage(text) {
        const el = document.createElement('div');
        el.className = 'msg user';
        const label = document.createElement('div');
        label.className = 'msg-label';
        label.textContent = 'You';
        el.appendChild(label);
        el.appendChild(document.createTextNode(text));
        document.getElementById('messages').appendChild(el);
        scrollToBottom();
    }

    function sendMessage() {
        const input = document.getElementById('input');
        const text = input.value.trim();
        if (!text || isWorking) return;

        addUserMessage(text);

        input.value = '';
        input.style.height = 'auto';
        isWorking = true;
        setStatus('working', 'Thinking...');

        socket.emit('acp_prompt', {
            csrf_token: csrfToken,
            session_id: sessionId,
            text: text,
        });
        scrollToBottom();
    }

    socket.on('acp_event', (data) => {
        if (data.session_id !== sessionId) return;
        const evt = data.event;

        // Handle user prompt replay
        if (evt.type === 'user_prompt') {
            addUserMessage(evt.text);
            return;
        }

        if (evt.type === 'session_ready') { setStatus('ready', 'Ready'); return; }
        if (evt.type === 'session_error') { setStatus('error', 'Error: ' + (evt.error || 'unknown')); return; }
        if (evt.type === 'session_ended') { setStatus('error', 'Session ended'); return; }

        const update = (evt.params || {}).update || {};
        const su = update.sessionUpdate;

        if (su === 'agent_message_chunk') {
            setStatus('working', 'Responding...');
            const c = update.content;
            if (c && c.type === 'text') appendChunk(c.text);
            else if (c && c.type === 'image') appendImage(c.data, c.mimeType);
        } else if (su === 'tool_call') {
            setStatus('working', 'Using ' + (update.title || 'tool') + '...');
            addToolCall(update.toolCallId, update.title, update.status, update.rawInput);
        } else if (su === 'tool_call_update') {
            const st = update.status || '';
            if (st === 'in_progress') setStatus('working', 'Running tool...');
            updateToolCall(update.toolCallId, update.status, update.content);
        }

        if (evt.result && evt.result.stopReason) {
            finishTurn();
        }
    });

    const input = document.getElementById('input');
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    window.addEventListener('beforeunload', () => {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'acp-chat-closing', sessionId: sessionId }, '*');
        }
    });
</script>
</body>
</html>
