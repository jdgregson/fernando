                            const val = document.createElement('div');
                            val.className = 'tc-param-val';
                            val.textContent = typeof v === 'string' ? v : JSON.stringify(v, null, 2);
                            row.appendChild(key);
                            row.appendChild(val);
                            panelIn.appendChild(row);
                        }
                    } catch(e) {
                        panelIn.textContent = inputText;
                    }
                }
                // Output panel
                const panelOut = document.createElement('div');
                panelOut.className = 'tc-panel' + (inputText ? '' : ' active');
                const outBlock = document.createElement('div');
                outBlock.className = 'tc-out-block';
                outBlock.textContent = outputText;
                panelOut.appendChild(outBlock);
                // Raw panels
                const rawIn = document.createElement('div');
                rawIn.className = 'tc-raw';
                rawIn.style.display = 'none';
                rawIn.textContent = inputText || '(no input)';
                const rawOut = document.createElement('div');
                rawOut.className = 'tc-raw';
                rawOut.style.display = 'none';
                rawOut.textContent = outputText;
                panelIn.appendChild(rawIn);
                panelOut.appendChild(rawOut);
                // State
                const jsonMode = { input: false, output: false };
                const prettyIn = panelIn.querySelector('.tc-param') || panelIn.firstChild;
                const prettyOut = outBlock;
                jsonToggle.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const active = panelIn.classList.contains('active') ? 'input' : 'output';
                    jsonMode[active] = !jsonMode[active];
                    jsonToggle.classList.toggle('active', jsonMode[active]);
                    if (active === 'input') {
                        Array.from(panelIn.children).forEach(c => { if (c !== rawIn) c.style.display = jsonMode.input ? 'none' : ''; });
                        rawIn.style.display = jsonMode.input ? '' : 'none';
                    } else {
                        prettyOut.style.display = jsonMode.output ? 'none' : '';
                        rawOut.style.display = jsonMode.output ? '' : 'none';
                    }
                });
                tabIn.addEventListener('click', (e) => { e.stopPropagation(); tabIn.classList.add('active'); tabOut.classList.remove('active'); panelIn.classList.add('active'); panelOut.classList.remove('active'); jsonToggle.classList.toggle('active', jsonMode.input); });
                tabOut.addEventListener('click', (e) => { e.stopPropagation(); tabOut.classList.add('active'); tabIn.classList.remove('active'); panelOut.classList.add('active'); panelIn.classList.remove('active'); jsonToggle.classList.toggle('active', jsonMode.output); });
                header.addEventListener('click', () => { arrow.classList.toggle('open'); tcBody.classList.toggle('open'); });
                tcBody.appendChild(tabs);
                tcBody.appendChild(panelIn);
                tcBody.appendChild(panelOut);
                div.appendChild(header);
                div.appendChild(tcBody);
                el.appendChild(div);
            } else if (part.trim()) {
                const cleaned = part.replace(/^\n/, '');
                if (!cleaned.trim()) continue;
                const content = document.createElement('div');
                content.className = 'msg-content';
                content.style.whiteSpace = 'pre-wrap';
                content.innerHTML = renderUserText(cleaned);
                collapseCodeBlocks(content, 30);
                highlightDiffs(content);
                _activateCanvases(content);
                el.appendChild(content);
            }
        }
    }

    function _addTimestampSpan(label, ts, model) {
        const span = document.createElement('span');
        span.className = 'msg-ts';
        const d = new Date(ts * 1000);
        const now = new Date();
        const h = String(d.getHours()).padStart(2, '0');
        const m = String(d.getMinutes()).padStart(2, '0');
        let text = '· ';
        if (d.toDateString() === now.toDateString()) {
            text += h + ':' + m;
        } else if (d.getFullYear() === now.getFullYear()) {
            text += d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + h + ':' + m;
        } else {
            text += d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0') + ' ' + h + ':' + m;
        }
        if (model) text += ' · ' + model;
        span.textContent = text;
        label.appendChild(span);
    }

    function addUserMessage(text, collapsed, ts) {
        const el = document.createElement('div');
        el.className = 'msg user';
        if (ts) el.dataset.ts = ts;
        const label = document.createElement('div');
        label.className = 'msg-label';
        label.textContent = 'You';
        if (ts) _addTimestampSpan(label, ts);
        el.appendChild(label);
        if (collapsed) {
            const preview = document.createElement('span');
            preview.style.cssText = 'color:#888;cursor:pointer';
            const lines = text.split('\n').length;
            preview.textContent = '▶ Context message (' + lines + ' lines)';
            const full = document.createElement('div');
            full.style.display = 'none';
            full.textContent = text;
            preview.onclick = () => {
                if (full.style.display === 'none') {
                    full.style.display = 'block';
                    preview.textContent = '▼ Context message (' + lines + ' lines)';
                } else {
                    full.style.display = 'none';
                    preview.textContent = '▶ Context message (' + lines + ' lines)';
                }
            };
            el.appendChild(preview);
            el.appendChild(full);
        } else {
            const parsed = parseAttachedFiles(text);
            if (parsed) {
                renderFileChips(parsed.paths, el);
                if (parsed.body.trim()) {
                    _renderUserBody(el, parsed.body);
                }
            } else {
                _renderUserBody(el, text);
            }
        }
        document.getElementById('messages').appendChild(el);
        scrollToBottom(true);
    }

    function addSystemMessage(text, extraClass) {
        const el = document.createElement('div');
        el.className = 'msg system' + (extraClass ? ' ' + extraClass : '');
        const prefix = extraClass === 'continuation' ? '⟳ Continuation: ' : (text.startsWith('✓') || text.startsWith('✗') ? '' : '⟳ ');
        const display = text.length > 75 && extraClass === 'continuation' ? text.slice(0, 75) + '…' : text;
        el.textContent = prefix + display;
        document.getElementById('messages').appendChild(el);
        scrollToBottom(true);
    }

    function sendMessage() {
        document.getElementById('sendBtn').blur();
        document.getElementById('slashMenu').style.display = 'none';
        slashIdx = -1;
        const input = document.getElementById('input');
        let text = input.value.trim();
        if ((!text && attachedFiles.length === 0) || isWorking || !isReady) return;

        // Intercept /model <name> to switch model directly
        const modelMatch = text.match(/^\/model\s+(.+)$/);
        if (modelMatch) {
            const newModel = modelMatch[1].trim();
            input.value = '';
            input.style.height = 'auto';
            localStorage.removeItem(draftKey);
            addSystemMessage('Switching to ' + newModel + '...');
            isWorking = true;
            setStatus('working', 'Switching model...');
            socket.emit('acp_change_model', { csrf_token: csrfToken, session_id: sessionId, model: newModel });
            return;
        }

        // Intercept /restart to reload the agent session
        if (text === '/restart') {
            input.value = '';
            input.style.height = 'auto';
            localStorage.removeItem(draftKey);
            addSystemMessage('Restarting agent session...');
            isWorking = true;
            setStatus('working', 'Restarting...');
            socket.emit('acp_restart', { csrf_token: csrfToken, session_id: sessionId });
            return;
        }

        // Flag bare /model so we show the model picker directly (client-side)
        if (text === '/authorization') {
            input.value = '';
            input.style.height = 'auto';
            localStorage.removeItem(draftKey);
            showAuthorizationModal();
            return;
        }
        if (text === '/model') {
            input.value = '';
            input.style.height = 'auto';
            localStorage.removeItem(draftKey);
            fetch('/api/models', {headers: {'X-API-Key': apiKey}})
                .then(r => r.json())
                .then(data => {
                    const models = (data.models || []).map(m => m.model_id);
                    showModelModal(models, window._sessionModel || 'claude-opus-4.6');
                })
                .catch(() => {
                    showModelModal(['claude-opus-4.6','claude-sonnet-4.6'], window._sessionModel || 'claude-opus-4.6');
                });
            return;
        }

        if (attachedFiles.length > 0) {
            const filePaths = attachedFiles.map(f => f.path).join('\n');
            const prefix = `[Attached files - saved to disk, use tools to read them]\n${filePaths}\n\n`;
            text = prefix + text;
            attachedFiles = [];
            renderAttached();
        }

        addUserMessage(text, false, Date.now() / 1000);
        _userScrolledUp = false;

        input.value = '';
        input.style.height = 'auto';
        localStorage.removeItem(draftKey);
        isWorking = true;
        setStatus('working', 'Thinking...');
        resetStallTimer();

        // Request pane context from parent, then send prompt
        function doSend(contextText) {
            const fullText = contextText ? contextText + '\n' + text : text;
            socket.emit('acp_prompt', {
                csrf_token: csrfToken,
                session_id: sessionId,
                text: fullText,
            });
            scrollToBottom(true);
        }
        if (window.parent !== window) {
            const ctxTimeout = setTimeout(() => doSend(''), 500);
            function onCtx(e) {
                if (e.source !== window.parent) return;
                if (e.data && e.data.type === 'pane-context') {
                    window.removeEventListener('message', onCtx);
                    clearTimeout(ctxTimeout);
                    const c = e.data.context;
                    const parts = [];
                    for (const [k, v] of Object.entries(c)) {
                        if (k === 'split') continue;
                        if (v.type === 'chat') parts.push(`${k}: this chat`);
                        else if (v.type === 'jupyter') parts.push(`${k}: Jupyter notebook "${v.notebook}"`);
                        else if (v.type === 'notebook') parts.push(`${k}: SilverBullet notebook "${v.notebook}"`);
                        else if (v.type === 'terminal') parts.push(`${k}: terminal session "${v.session || 'none'}"`);
                        else if (v.type === 'desktop') parts.push(`${k}: Kasm desktop`);
                    }
                    doSend(parts.length ? '[Pane context: ' + parts.join(', ') + ']' : '');
                }
            }
            window.addEventListener('message', onCtx);
            window.parent.postMessage({ type: 'get-pane-context' }, '*');
        } else {
            doSend('');
        }
    }

    socket.on('acp_history_size', (data) => {
        if (data.session_id !== sessionId) return;
        if (data.count === 0) {
            setStatus('connecting', 'Starting...');
        } else {
            setStatus('connecting', 'Loading ' + data.count.toLocaleString() + ' events...');
        }
    });

    socket.on('acp_history_batch', (data) => {
        if (data.session_id !== sessionId) return;
        resetStallTimer();
        const events = data.events || [];
        if (events.length === 0) {
            setStatus('connecting', 'Starting...');
        } else {
            setStatus('connecting', 'Loading ' + events.length + ' events...');
        }

        // Let the browser repaint to show the loading status before processing
        requestAnimationFrame(() => {

        // Suppress per-message scroll during batch rendering
        _suppressScroll = true;

        // Process all history events synchronously
        for (let i = 0; i < events.length; i++) {
            processEvent({ session_id: data.session_id, event: events[i] });
        }

        // Process step_progress catch-up events
        const stepProgress = data.step_progress || [];
        for (let i = 0; i < stepProgress.length; i++) {
            processEvent({ session_id: data.session_id, event: stepProgress[i] });
        }

        // Restore scroll and scroll once
        _suppressScroll = false;
        scrollToBottom(true);

        // Apply sync state
        if (data.sync_seq !== undefined) expectedSeq = data.sync_seq;
        if (data.model) window._sessionModel = data.model;
        if (data.history_length !== undefined) historyOffset = data.history_length;

        // Drain any buffered live events that arrived during load
        while (seqBuffer[expectedSeq]) {
            processEvent(seqBuffer[expectedSeq]);
            delete seqBuffer[expectedSeq];
            expectedSeq++;
        }

        // Handle archived vs active
        if (data.archived) {
            finishTurn();
            setStatus('archived', 'Archived — read-only preview');
            document.getElementById('input').disabled = true;
            document.getElementById('sendBtn').disabled = true;
        }
        }); // end requestAnimationFrame
    });

    socket.on('acp_event', (data) => {
        if (data.session_id !== sessionId) return;
        resetStallTimer();

        // Sequence-based reordering for live events
        if (data.seq !== undefined) {
            if (expectedSeq === -1) {
                // Not synced yet, buffer it
                console.warn('[acp] buffering seq', data.seq, '(not synced yet)');
                seqBuffer[data.seq] = data;
                return;
            }
            if (data.seq !== expectedSeq) {
                // Out of order — buffer and wait
                console.warn('[acp] out of order: got seq', data.seq, 'expected', expectedSeq, '- buffering');
                seqBuffer[data.seq] = data;
                // Safety: if buffer grows too large, we likely have a seq mismatch — reset
                if (Object.keys(seqBuffer).length > 50) {
                    console.error('[acp] seq buffer overflow — resetting. Expected:', expectedSeq, 'buffered:', Object.keys(seqBuffer).map(Number).sort((a,b)=>a-b).slice(0,5));
                    const sorted = Object.keys(seqBuffer).map(Number).sort((a, b) => a - b);
                    expectedSeq = sorted[0];
                    while (seqBuffer[expectedSeq]) {
                        processEvent(seqBuffer[expectedSeq]);
                        delete seqBuffer[expectedSeq];
                        expectedSeq++;
                    }
                }
                return;
            }
            // In order — process it and drain buffer
            processEvent(data);
            expectedSeq++;
            while (seqBuffer[expectedSeq]) {
                processEvent(seqBuffer[expectedSeq]);
                delete seqBuffer[expectedSeq];
                expectedSeq++;
            }
            return;
        }

        // Unsequenced events (history replay, synthetic)
        const evt = data.event;
        if (evt.type === 'sync_seq') {
            // Server tells us the next live seq to expect and actual history length
            console.log('[acp] sync_seq: expectedSeq=', evt.seq, 'history_length=', evt.history_length, 'buffered=', Object.keys(seqBuffer).length);
            expectedSeq = evt.seq;
            if (evt.model) window._sessionModel = evt.model;
            if (evt.history_length !== undefined) historyOffset = evt.history_length;
            while (seqBuffer[expectedSeq]) {
                processEvent(seqBuffer[expectedSeq]);
                delete seqBuffer[expectedSeq];
                expectedSeq++;
            }
            return;
        }
        processEvent(data);
    });

    function processEvent(data) {
        const evt = data.event;

        // Track history offset for reconnect — only for live (sequenced) events
        if (data.seq !== undefined && evt.type !== 'session_ready' && evt.type !== 'session_error' && evt.type !== 'session_ended' && evt.type !== 'sync_seq') {
            historyOffset++;
        }

        // Handle user prompt from our history
        if (evt.type === 'user_prompt' || evt.type === 'continuation') {
            if (currentAssistantMsg) finishTurn();
            if (evt.text && evt.text.startsWith('[CONTINUATION] ')) {
                addSystemMessage(evt.text.slice(15), 'continuation');
            } else {
                const display = (evt.text || '').replace(/^\[Pane context:[^\]]*\]\n/, '');
                addUserMessage(display, false, evt.ts);
            }
            return;
        }

        // Replay step_progress from history
        if (evt.type === 'step_progress') {
            handleStepProgress(evt.data || evt);
            return;
        }

        if (evt.type === 'session_ready') {
            finishTurn();
            setStatus('ready', 'Ready');
            return;
        }
        if (evt.type === 'system_message') { addSystemMessage(evt.text); return; }
        if (evt.type === 'session_error') { finishTurn(); setStatus('error', 'Error: ' + (evt.error || 'unknown')); return; }
        if (evt.type === 'session_ended') { finishTurn(); setStatus('error', 'Session ended'); return; }
        if (evt.type === 'archived_preview') { finishTurn(); setStatus('archived', 'Archived — read-only preview'); document.getElementById('input').disabled = true; document.getElementById('sendBtn').disabled = true; return; }
        if (evt.type === 'acp_error') { finishTurn(); setStatus('error', 'Error: ' + (evt.error || 'unknown')); setTimeout(() => setStatus('ready', 'Ready'), 3000); return; }

        const update = (evt.params || {}).update || {};
        const su = update.sessionUpdate;

        // Capture timestamp and model for this assistant turn from the first event
        if (!currentTurnTs && evt.ts) currentTurnTs = evt.ts;
        if (!currentTurnModel && evt.model) currentTurnModel = evt.model;

        // user_message_chunk from session/load replay
        if (su === 'user_message_chunk') {
            // End any in-progress assistant message
            if (currentAssistantMsg) finishTurn();
            const c = update.content;
            if (c && c.type === 'text') {
                if (c.text.startsWith('[CONTINUATION] ')) {
                    addSystemMessage(c.text.slice(15), 'continuation');
                } else {
                    userMsgCount++;
                    const display = c.text.replace(/^\[Pane context:[^\]]*\]\n/, '');
                    addUserMessage(display, userMsgCount === 1);
                }
            }
        } else if (su === 'agent_thought_chunk') {
            setStatus('working', 'Thinking...');
            const c = update.content;
            if (c && c.type === 'text') appendThought(c.text);
        } else if (su === 'agent_message_chunk') {
            closeThought();
            setStatus('working', 'Responding...');
            const c = update.content;
            if (c && c.type === 'text') appendChunk(c.text);
            else if (c && c.type === 'image') appendImage(c.data, c.mimeType);
        } else if (su === 'tool_call') {
            closeThought();
            setStatus('working', (update.title || 'Using tool') + '...');
            addToolCall(update.toolCallId, update.title, update.status, update.rawInput);
        } else if (su === 'tool_call_update') {
            const st = update.status || '';
            if (st === 'in_progress') setStatus('working', 'Running tool...');
            updateToolCall(update.toolCallId, update.status, update.content, update.rawOutput);
        }

        if (evt.result && evt.result.stopReason) {
            if (evt.result.stopReason === 'tool_use') {
                setStatus('working', 'Running tool...');
            } else {
                finishTurn();
            }
        }
    }

    const input = document.getElementById('input');
    const draftKey = 'acp_draft_' + sessionId;
    let draftTimer = null;
    function saveDraft() {
        const v = input.value;
        if (v) localStorage.setItem(draftKey, v);
        else localStorage.removeItem(draftKey);
    }
    let resizeRaf = null;
    const slashCommands = [
        {cmd: '/model', desc: 'Switch AI model'},
        {cmd: '/restart', desc: 'Restart agent session'},
        {cmd: '/authorization', desc: 'View/manage permissions'},
    ];
    let slashIdx = -1;

    function showSlashMenu(filter) {
        const menu = document.getElementById('slashMenu');
        const matches = slashCommands.filter(c => c.cmd.startsWith(filter));
        if (!matches.length || filter === '') { menu.style.display = 'none'; slashIdx = -1; return; }
        menu.innerHTML = matches.map((c, i) =>
            `<div class="slash-item${i === slashIdx ? ' active' : ''}" data-cmd="${c.cmd}" style="padding:6px 12px;cursor:pointer;display:flex;justify-content:space-between;gap:12px;${i === slashIdx ? 'background:#2a2f45;' : ''}" onmousedown="completeSlash('${c.cmd}')"><span style="color:#e0e0e0">${c.cmd}</span><span style="color:#666;font-size:12px">${c.desc}</span></div>`
        ).join('');
        menu.style.display = 'block';
    }

    window.completeSlash = function(cmd) {
        input.value = cmd;
        document.getElementById('slashMenu').style.display = 'none';
        slashIdx = -1;
        input.focus();
    };

    input.addEventListener('input', () => {
        if (!resizeRaf) {
            resizeRaf = requestAnimationFrame(() => {
                input.style.height = 'auto';
                input.style.height = Math.min(input.scrollHeight, 120) + 'px';
                resizeRaf = null;
            });
        }
        clearTimeout(draftTimer);
        draftTimer = setTimeout(saveDraft, 2000);
        // Slash command autocomplete
        const val = input.value;
        if (val.startsWith('/') && !val.includes(' ') && !val.includes('\n')) {
            showSlashMenu(val);
        } else {
            document.getElementById('slashMenu').style.display = 'none';
            slashIdx = -1;
        }
    });
    // Restore draft on load
    const saved = localStorage.getItem(draftKey);
    if (saved) {
        input.value = saved;
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    }
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    input.addEventListener('keydown', (e) => {
        const menu = document.getElementById('slashMenu');
        if (menu.style.display !== 'none') {
            const items = menu.querySelectorAll('.slash-item');
            if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
                e.preventDefault();
                slashIdx = e.key === 'ArrowDown'
                    ? Math.min(slashIdx + 1, items.length - 1)
                    : Math.max(slashIdx - 1, 0);
                items.forEach((el, i) => { el.style.background = i === slashIdx ? '#2a2f45' : ''; });
                return;
            }
            if ((e.key === 'Tab' || e.key === 'Enter') && slashIdx >= 0) {
                e.preventDefault();
                const cmd = items[slashIdx]?.dataset.cmd;
                if (cmd) completeSlash(cmd);
                return;
            }
            if (e.key === 'Escape') { menu.style.display = 'none'; slashIdx = -1; return; }
        }
        if (e.key === 'Enter' && !isIOS && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    let attachedFiles = []; // [{name, path}]

    function downsampleImage(file, maxDim = 1920, quality = 0.8) {
        return new Promise((resolve) => {
            if (!file.type.startsWith('image/')) return resolve(file);
            const img = new Image();
            img.onload = () => {
                URL.revokeObjectURL(img.src);
                if (img.width <= maxDim && img.height <= maxDim && file.size <= 2 * 1024 * 1024) return resolve(file);
                const scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
                const c = document.createElement('canvas');
                c.width = Math.round(img.width * scale);
                c.height = Math.round(img.height * scale);
                c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
                c.toBlob(b => resolve(new File([b], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' })), 'image/jpeg', quality);
            };
            img.onerror = () => resolve(file);
            img.src = URL.createObjectURL(file);
        });
    }

    async function handleFiles(fileList) {
        const indicator = document.getElementById('uploadingIndicator');
        indicator.style.display = '';
        for (const file of fileList) {
            indicator.textContent = 'Uploading ' + file.name + '...';
            const processed = await downsampleImage(file);
            const form = new FormData();
            form.append('file', processed);
            try {
                const resp = await fetch('/api/upload', { method: 'POST', body: form, headers: { 'X-API-Key': apiKey } });
                if (!resp.ok) throw new Error('Server returned ' + resp.status);
                const data = await resp.json();
                if (data.path) {
                    attachedFiles.push({ name: data.name, path: data.path });
                    renderAttached();
                }
            } catch(e) {
                console.error('Upload failed:', e);
                indicator.textContent = 'Upload failed: ' + (e.message || 'unknown error');
                indicator.style.color = '#f44747';
                setTimeout(() => { indicator.style.display = 'none'; indicator.style.color = ''; }, 3000);
                return;
            }
        }
        indicator.style.display = 'none';
        document.getElementById('fileInput').value = '';
    }

    function renderAttached() {
        const container = document.getElementById('attachedFiles');
        container.innerHTML = attachedFiles.map((f, i) =>
            `<span class="attached-file"><span class="name">${escapeHtml(f.name)}</span><span class="remove" data-idx="${i}"><svg width="8" height="8" viewBox="0 0 10 10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="1" y1="1" x2="9" y2="9"/><line x1="9" y1="1" x2="1" y2="9"/></svg></span></span>`
        ).join('');
        container.querySelectorAll('.remove').forEach(el => {
            el.onclick = () => removeAttached(parseInt(el.dataset.idx));
        });
    }

    function removeAttached(idx) {
        attachedFiles.splice(idx, 1);
        renderAttached();
    }



    // iOS: throttle scroll speed when dragging text selection to prevent overshoot
    (function() {
        const msgs = document.querySelector('.messages');
        if (!msgs || !('ontouchstart' in window)) return;
        let selActive = false, lastScrollTop = 0, rafId = null;
        const MAX_SCROLL_PER_FRAME = 8;
        function clampScroll() {
            if (!selActive) return;
            const delta = msgs.scrollTop - lastScrollTop;
            if (Math.abs(delta) > MAX_SCROLL_PER_FRAME) {
                msgs.scrollTop = lastScrollTop + Math.sign(delta) * MAX_SCROLL_PER_FRAME;
            }
            lastScrollTop = msgs.scrollTop;
            rafId = requestAnimationFrame(clampScroll);
        }
        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection();
            const hasSelection = sel && sel.toString().length > 0;
            if (hasSelection && !selActive) {
                selActive = true;
                lastScrollTop = msgs.scrollTop;
                rafId = requestAnimationFrame(clampScroll);
            } else if (!hasSelection && selActive) {
                selActive = false;
                if (rafId) cancelAnimationFrame(rafId);
            }
        });
        msgs.addEventListener('touchend', () => {
            setTimeout(() => {
                if (selActive && (!window.getSelection() || !window.getSelection().toString())) {
                    selActive = false;
                    if (rafId) cancelAnimationFrame(rafId);
                }
            }, 300);
        });
    })();

    // Timestamp reveal: 1.5s hover on a message then sticky, mobile long-press
    (function() {
        const msgs = document.querySelector('.messages');
        if (!msgs) return;
        let hoverTimer = null;
        let hoverMsg = null;
        let tsVisible = false;

        function showAll() {
            tsVisible = true;
            msgs.querySelectorAll('.msg-ts').forEach(s => s.classList.add('visible'));
        }
        function hideAll() {
            tsVisible = false;
            msgs.querySelectorAll('.msg-ts').forEach(s => s.classList.remove('visible'));
        }

        // Observe new messages and auto-show their timestamps if already in visible mode
        const obs = new MutationObserver(() => { if (tsVisible) showAll(); });
        obs.observe(msgs, { childList: true, subtree: true });

        if ('ontouchstart' in window) {
            // Mobile: long-press 500ms to reveal, tap elsewhere to dismiss
            let pressTimer = null;
            msgs.addEventListener('touchstart', (e) => {
                const msg = e.target.closest('.msg');
                if (!msg) return;
                pressTimer = setTimeout(() => { pressTimer = null; showAll(); }, 500);
            });
            msgs.addEventListener('touchend', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
            msgs.addEventListener('touchmove', () => { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } });
            document.addEventListener('touchstart', (e) => { if (tsVisible && !e.target.closest('.messages')) hideAll(); });
        } else {
            // Desktop: 1.5s hover on a specific message, then show all until mouseout from messages area
            msgs.addEventListener('mouseover', (e) => {
                const msg = e.target.closest('.msg');
                if (tsVisible) return;
                if (msg && msg !== hoverMsg) {
                    if (hoverTimer) clearTimeout(hoverTimer);
                    hoverMsg = msg;
                    hoverTimer = setTimeout(showAll, 1500);
                }
            });
            msgs.addEventListener('mouseout', (e) => {
                const msg = e.target.closest('.msg');
                const related = e.relatedTarget && e.relatedTarget.closest && e.relatedTarget.closest('.msg');
                // Left the hovered message without entering another — reset timer
                if (!tsVisible && msg === hoverMsg && related !== hoverMsg) {
                    if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
                    hoverMsg = null;
                }
            });
            msgs.addEventListener('mouseleave', () => {
                if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
                hoverMsg = null;
                if (tsVisible) hideAll();
            });
            msgs.addEventListener('scroll', () => {
                if (hoverTimer) { clearTimeout(hoverTimer); hoverTimer = null; }
                hoverMsg = null;
            });
        }
    })();

    // --- Plus menu & Tool modal ---
    let _mcpServers = null;
    let _mcpToolsByServer = {}; // server -> tools[]
    let _selectedTool = null;
    let _toolResult = null;
    let _toolArgs = null;

    function togglePlusMenu(e) {
        e.stopPropagation();
        const menu = document.getElementById('plusMenu');
        menu.classList.toggle('open');
        if (menu.classList.contains('open')) {
            document.addEventListener('click', _closePlusMenu, { once: true });
        }
    }
    function _closePlusMenu() { document.getElementById('plusMenu').classList.remove('open'); }
    function plusMenuAttach() {
        _closePlusMenu();
        document.getElementById('fileInput').click();
    }
    function plusMenuTool() {
        _closePlusMenu();
        openToolModal();
    }

    async function openToolModal() {
        document.getElementById('toolModalOverlay').classList.add('open');
        document.getElementById('toolPickerView').style.display = '';
        document.getElementById('toolExecView').style.display = 'none';
        document.getElementById('toolSearch').value = '';
        const list = document.getElementById('toolList');
        // Show cached servers instantly, refresh in background
        if (!_mcpServers) {
            try { _mcpServers = JSON.parse(localStorage.getItem('mcp_servers')); } catch(e) {}
        }
        if (_mcpServers) {
            renderServerList();
        } else {
            list.innerHTML = '<div style="color:#666;font-size:12px;padding:10px">Loading servers...</div>';
        }
        try {
            const res = await fetch('/api/mcp/servers?api_key=' + encodeURIComponent(apiKey));
            const data = await res.json();
            const fresh = data.servers || [];
            if (fresh.length > 0) {
                _mcpServers = fresh;
                localStorage.setItem('mcp_servers', JSON.stringify(_mcpServers));
                renderServerList();
            }
        } catch(e) {
            if (!_mcpServers) list.innerHTML = '<div style="color:#f7768e;font-size:12px;padding:10px">Failed to load servers</div>';
        }
    }

    function closeToolModal() {
        document.getElementById('toolModalOverlay').classList.remove('open');
    }

    function renderServerList() {
        const list = document.getElementById('toolList');
        const q = document.getElementById('toolSearch').value.toLowerCase();
        list.innerHTML = '';
        for (const server of (_mcpServers || [])) {
            if (q && !server.toLowerCase().includes(q)) {
                // If searching, also check loaded tools
                const tools = _mcpToolsByServer[server];
                if (tools && !tools.some(t => t.name.toLowerCase().includes(q) || t.description.toLowerCase().includes(q))) continue;
                else if (!tools) continue;
            }
            const section = document.createElement('div');
            section.className = 'tool-server-section';
            const header = document.createElement('div');
            header.className = 'tool-server-header';
            header.innerHTML = '<span class="tool-server-arrow">▶</span><span class="tool-server-name">' + escapeHtml(server) + '</span>';
            const body = document.createElement('div');
            body.className = 'tool-server-body';
            body.style.display = 'none';

            header.addEventListener('click', () => {
                const open = body.style.display !== 'none';
                body.style.display = open ? 'none' : '';
                header.querySelector('.tool-server-arrow').classList.toggle('open', !open);
                if (!open) loadServerTools(server, body);
            });

            section.appendChild(header);
            section.appendChild(body);
            list.appendChild(section);

            // If searching and tools are loaded, auto-expand matching
            if (q && _mcpToolsByServer[server]) {
                body.style.display = '';
                header.querySelector('.tool-server-arrow').classList.add('open');
                renderServerTools(server, body, q);
            }
        }
    }

    async function loadServerTools(server, container) {
        if (_mcpToolsByServer[server]) {
            renderServerTools(server, container);
            return;
        }
        // Try localStorage cache first
        try {
            const cached = localStorage.getItem('mcp_tools_' + server);
            if (cached) {
                _mcpToolsByServer[server] = JSON.parse(cached);
                renderServerTools(server, container);
                // Refresh in background
                fetch('/api/mcp/tools?server=' + encodeURIComponent(server) + '&api_key=' + encodeURIComponent(apiKey))
                    .then(r => r.json()).then(data => {
                        _mcpToolsByServer[server] = data.tools || [];
                        localStorage.setItem('mcp_tools_' + server, JSON.stringify(_mcpToolsByServer[server]));
                    }).catch(() => {});
                return;
            }
        } catch(e) {}
        container.innerHTML = '<div style="color:#666;font-size:11px;padding:6px 10px">Loading...</div>';
        try {
            const res = await fetch('/api/mcp/tools?server=' + encodeURIComponent(server) + '&api_key=' + encodeURIComponent(apiKey));
            const data = await res.json();
            _mcpToolsByServer[server] = data.tools || [];
            localStorage.setItem('mcp_tools_' + server, JSON.stringify(_mcpToolsByServer[server]));
        } catch(e) {
            container.innerHTML = '<div style="color:#f7768e;font-size:11px;padding:6px 10px">Failed to load</div>';
            return;
        }
        renderServerTools(server, container);
    }

    function renderServerTools(server, container, filter) {
        container.innerHTML = '';
        let tools = _mcpToolsByServer[server] || [];
        if (filter) tools = tools.filter(t => t.name.toLowerCase().includes(filter) || t.description.toLowerCase().includes(filter));
        for (const t of tools) {
            const item = document.createElement('div');
            item.className = 'tool-list-item';
            item.innerHTML = '<div class="tl-name">' + escapeHtml(t.name) + '</div>' +
                (t.description ? '<div class="tl-desc">' + escapeHtml(t.description) + '</div>' : '');
            item.addEventListener('click', () => selectTool(t));
            container.appendChild(item);
        }
        if (tools.length === 0) {
            container.innerHTML = '<div style="color:#555;font-size:11px;padding:6px 10px">No tools' + (filter ? ' matching' : '') + '</div>';
        }
    }

    function filterTools() {
        renderServerList();
    }

    function selectTool(tool) {
        _selectedTool = tool;
        _toolResult = null;
        document.getElementById('toolPickerView').style.display = 'none';
        document.getElementById('toolExecView').style.display = '';
        document.getElementById('toolExecName').textContent = tool.name;
        document.getElementById('toolExecDesc').textContent = tool.description || '';
        document.getElementById('toolExecResult').style.display = 'none';
        document.getElementById('toolAttachBtn').style.display = 'none';
        document.getElementById('toolRunBtn').disabled = false;
        // Build param form from schema
        const paramsDiv = document.getElementById('toolExecParams');
        paramsDiv.innerHTML = '';
        const schema = tool.inputSchema || {};
        const props = schema.properties || {};
        const required = schema.required || [];
        for (const [name, prop] of Object.entries(props)) {
            const lbl = document.createElement('label');
            lbl.setAttribute('for', 'tp_' + name);
            lbl.innerHTML = escapeHtml(name) + (required.includes(name) ? '' : '<span class="param-optional">optional</span>');
            paramsDiv.appendChild(lbl);
            if (prop.type === 'string' && (prop.description || '').length > 80) {
                const ta = document.createElement('textarea');
                ta.id = 'tp_' + name;
                ta.placeholder = prop.description || '';
                ta.autocapitalize = 'off';
                ta.spellcheck = true;
                paramsDiv.appendChild(ta);
            } else if (prop.enum) {
                const sel = document.createElement('select');
                sel.id = 'tp_' + name;
                sel.style.cssText = 'width:100%;padding:6px 10px;border-radius:4px;border:1px solid #283d5b;background:#0d1a2e;color:#c0caf5;font-size:12px;outline:none';
                if (!required.includes(name)) { const opt = document.createElement('option'); opt.value = ''; opt.textContent = '(none)'; sel.appendChild(opt); }
                for (const v of prop.enum) { const opt = document.createElement('option'); opt.value = v; opt.textContent = v; sel.appendChild(opt); }
                paramsDiv.appendChild(sel);
            } else {
                const inp = document.createElement('input');
                inp.id = 'tp_' + name;
                inp.type = prop.type === 'integer' || prop.type === 'number' ? 'number' : 'text';
                inp.placeholder = prop.description || '';
                inp.autocapitalize = 'off';
                inp.spellcheck = true;
                if (prop.default !== undefined) inp.value = prop.default;
                paramsDiv.appendChild(inp);
            }
        }
    }

    function showToolPicker() {
        document.getElementById('toolPickerView').style.display = '';
        document.getElementById('toolExecView').style.display = 'none';
    }

    async function runSelectedTool() {
        if (!_selectedTool) return;
        const btn = document.getElementById('toolRunBtn');
        btn.disabled = true;
        btn.textContent = 'Running...';
        // Gather params
        const schema = _selectedTool.inputSchema || {};
        const props = schema.properties || {};
        const args = {};
        for (const [name, prop] of Object.entries(props)) {
            const el = document.getElementById('tp_' + name);
            if (!el) continue;
            const val = el.value.trim();
            if (!val) continue;
            if (prop.type === 'integer') args[name] = parseInt(val, 10);
            else if (prop.type === 'number') args[name] = parseFloat(val);
            else if (prop.type === 'boolean') args[name] = val === 'true';
            else args[name] = val;
        }
        _toolArgs = args;
        const _doCall = () => fetch('/api/mcp/call', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'X-API-Key': apiKey },
            body: JSON.stringify({ server: _selectedTool.server, tool: _selectedTool.name, arguments: args })
        });
        try {
            let res;
            try { res = await _doCall(); } catch(e1) { res = await _doCall(); } // retry once on network error
            const data = await res.json();
            _toolResult = data;
            const resultDiv = document.getElementById('toolExecResult');
            const contentDiv = document.getElementById('toolResultContent');
            resultDiv.style.display = '';
            document.getElementById('toolAttachBtn').style.display = '';
            const text = (data.content || []).map(c => c.text || '').join('\n');
            contentDiv.textContent = text || JSON.stringify(data, null, 2);
            contentDiv.className = 'tool-exec-result-content' + (data.isError ? ' error' : '');
        } catch(e) {
            const resultDiv = document.getElementById('toolExecResult');
            const contentDiv = document.getElementById('toolResultContent');
            resultDiv.style.display = '';
            document.getElementById('toolAttachBtn').style.display = '';
            contentDiv.textContent = 'Error: ' + e.message;
            contentDiv.className = 'tool-exec-result-content error';
            _toolResult = { content: [{ type: 'text', text: 'Error: ' + e.message }], isError: true };
        }
        btn.disabled = false;
        btn.textContent = 'Run';
    }

    function attachToolResult() {
        if (!_toolResult || !_selectedTool) return;
        const text = (_toolResult.content || []).map(c => c.text || '').join('\n');
        const argsStr = _toolArgs && Object.keys(_toolArgs).length ? JSON.stringify(_toolArgs, null, 2) : '';
        let block = '[Tool result: ' + _selectedTool.server + '/' + _selectedTool.name + ']\n';
        if (argsStr) block += 'Input:\n```\n' + argsStr + '\n```\n';
        block += 'Output:\n```\n' + text + '\n```';
        const input = document.getElementById('input');
        const cur = input.value;
        input.value = cur + (cur && !cur.endsWith('\n') ? '\n' : '') + block;
        input.style.height = 'auto';
        input.style.height = input.scrollHeight + 'px';
        closeToolModal();
    }
</script>
