<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; background: #1e1e1e; color: #d4d4d4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; }

        .chat-header {
            background: #252526;
            border-bottom: 1px solid #3e3e42;
            padding: 8px 16px;
            font-size: 13px;
            color: #888;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        .chat-header .status { width: 8px; height: 8px; border-radius: 50%; background: #888; }
        .chat-header .status.ready { background: #4ec9b0; }
        .chat-header .status.working { background: #dcdcaa; animation: pulse 1s infinite; }
        .chat-header .status.error { background: #f44747; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .msg.user {
            align-self: flex-end;
            background: #264f78;
            color: #fff;
            border-bottom-right-radius: 2px;
        }
        .msg.assistant {
            align-self: flex-start;
            background: #2d2d2d;
            border: 1px solid #3e3e42;
            border-bottom-left-radius: 2px;
        }
        .msg.assistant .tool-call {
            background: #1a1a2e;
            border: 1px solid #3e3e42;
            border-radius: 4px;
            padding: 6px 10px;
            margin: 6px 0;
            font-size: 12px;
            font-family: 'SF Mono', Menlo, Consolas, monospace;
            color: #9cdcfe;
        }
        .msg.assistant .tool-call .tool-name { color: #dcdcaa; font-weight: bold; }
        .msg.assistant .tool-call .tool-status { color: #888; font-style: italic; }
        .msg.system {
            align-self: center;
            color: #888;
            font-size: 12px;
            font-style: italic;
        }

        .input-area {
            background: #252526;
            border-top: 1px solid #3e3e42;
            padding: 12px 16px;
            display: flex;
            gap: 8px;
            flex-shrink: 0;
        }
        .input-area textarea {
            flex: 1;
            background: #3c3c3c;
            border: 1px solid #3e3e42;
            color: #d4d4d4;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            resize: none;
            outline: none;
            min-height: 40px;
            max-height: 120px;
        }
        .input-area textarea:focus { border-color: #3465a3; }
        .input-area button {
            background: #3465a3;
            border: none;
            color: #fff;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            align-self: flex-end;
        }
        .input-area button:hover { background: #4a7bc8; }
        .input-area button:disabled { background: #555; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="chat-header">
        <div class="status" id="status"></div>
        <span id="statusText">Starting...</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <textarea id="input" placeholder="Message Kiro..." rows="1" disabled></textarea>
        <button id="sendBtn" onclick="sendMessage()" disabled>Send</button>
    </div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js" integrity="sha384-/KNQL8Nu5gCHLqwqfQjA689Hhoqgi2S84SNUxC3roTe4EhJ9AfLkp8QiQcU8AMzI" crossorigin="anonymous"></script>
<script>
    const sessionId = "{{ acp_session_id }}";
    const apiKey = "{{ api_key }}";
    let csrfToken = null;
    let isWorking = false;

    const socket = io({
        path: window.location.pathname.replace(/\/chat\/.*$/, '') + '/socket.io',
        query: { api_key: apiKey },
        reconnection: true,
    });

    socket.on('connected', (data) => {
        csrfToken = data.csrf_token;
        // Register this socket for ACP events
        socket.emit('acp_subscribe', { csrf_token: csrfToken, session_id: sessionId });
    });

    function setStatus(state, text) {
        const el = document.getElementById('status');
        const txt = document.getElementById('statusText');
        el.className = 'status ' + state;
        txt.textContent = text;
        const input = document.getElementById('input');
        const btn = document.getElementById('sendBtn');
        if (state === 'ready') {
            input.disabled = false;
            btn.disabled = false;
            input.focus();
        } else if (state === 'error') {
            input.disabled = true;
            btn.disabled = true;
        }
    }

    function addMessage(role, content) {
        const el = document.createElement('div');
        el.className = 'msg ' + role;
        if (role === 'system') {
            el.textContent = content;
        } else {
            el.innerHTML = content;
        }
        document.getElementById('messages').appendChild(el);
        scrollToBottom();
        return el;
    }

    let currentAssistantMsg = null;
    let currentText = '';

    function appendChunk(text) {
        if (!currentAssistantMsg) {
            currentText = '';
            currentAssistantMsg = addMessage('assistant', '');
        }
        currentText += text;
        currentAssistantMsg.innerHTML = escapeHtml(currentText);
        scrollToBottom();
    }

    function addToolCall(name, status, params) {
        if (!currentAssistantMsg) {
            currentText = '';
            currentAssistantMsg = addMessage('assistant', '');
        }
        const div = document.createElement('div');
        div.className = 'tool-call';
        div.id = 'tool-' + name + '-' + Date.now();
        div.innerHTML = '<span class="tool-name">' + escapeHtml(name) + '</span> <span class="tool-status">' + escapeHtml(status) + '</span>';
        currentAssistantMsg.appendChild(div);
        scrollToBottom();
        return div.id;
    }

    function finishTurn() {
        currentAssistantMsg = null;
        currentText = '';
        isWorking = false;
        setStatus('ready', 'Ready');
    }

    function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    function scrollToBottom() {
        const m = document.getElementById('messages');
        m.scrollTop = m.scrollHeight;
    }

    function sendMessage() {
        const input = document.getElementById('input');
        const text = input.value.trim();
        if (!text || isWorking) return;

        addMessage('user', escapeHtml(text));
        input.value = '';
        input.style.height = 'auto';
        isWorking = true;
        setStatus('working', 'Thinking...');

        socket.emit('acp_prompt', {
            csrf_token: csrfToken,
            session_id: sessionId,
            text: text,
        });
    }

    // ACP events from backend
    socket.on('acp_event', (data) => {
        if (data.session_id !== sessionId) return;
        const evt = data.event;

        if (evt.type === 'session_ready') {
            setStatus('ready', 'Ready');
            return;
        }
        if (evt.type === 'session_error') {
            setStatus('error', 'Error: ' + (evt.error || 'unknown'));
            return;
        }
        if (evt.type === 'session_ended') {
            setStatus('error', 'Session ended');
            return;
        }

        // ACP notifications
        const method = evt.method;
        const params = evt.params || {};
        const update = params.update || {};
        const sessionUpdate = update.sessionUpdate;

        if (sessionUpdate === 'agent_message_chunk') {
            setStatus('working', 'Responding...');
            const c = update.content;
            if (c && c.type === 'text') appendChunk(c.text);
        } else if (sessionUpdate === 'tool_call') {
            setStatus('working', 'Using ' + (update.title || 'tool') + '...');
            addToolCall(update.title || 'tool', update.status || '', null);
        } else if (sessionUpdate === 'tool_call_update') {
            setStatus('working', 'Running tool...');
        }

        // Handle prompt response (end of turn)
        if (evt.id && evt.result && evt.result.stopReason) {
            finishTurn();
        }
    });

    // Auto-resize textarea
    const input = document.getElementById('input');
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    });
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    // Notify parent frame that chat is closing
    window.addEventListener('beforeunload', () => {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'acp-chat-closing', sessionId: sessionId }, '*');
        }
    });
</script>
</body>
</html>
