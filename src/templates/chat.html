<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/css/chat.css">
</head>
<body>
    <div class="chat-header">
        <div class="status" id="status"></div>
        <span id="statusText">Starting...</span>
    </div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
        <div class="attached-files" id="attachedFiles"></div>
        <span class="uploading-indicator" id="uploadingIndicator" style="display:none">Uploading...</span>
        <div class="input-row">
            <div class="textarea-wrap">
                <textarea id="input" placeholder="Message Kiro..." rows="1" spellcheck="true" disabled></textarea>
                <label class="attach-btn" id="attachBtn" for="fileInput"><svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="10" y1="4" x2="10" y2="16"/><line x1="4" y1="10" x2="16" y2="10"/></svg></label>
                <input type="file" id="fileInput" multiple style="display:none" onchange="handleFiles(this.files)">
            </div>
            <button type="button" id="sendBtn" tabindex="-1" class="disabled" onclick="sendMessage()">Send</button>
        </div>
    </div>

<script src="https://cdn.socket.io/4.5.4/socket.io.min.js" integrity="sha384-/KNQL8Nu5gCHLqwqfQjA689Hhoqgi2S84SNUxC3roTe4EhJ9AfLkp8QiQcU8AMzI" crossorigin="anonymous"></script>
<script>
    const sessionId = "{{ acp_session_id }}";
    const apiKey = "{{ api_key }}";
    let csrfToken = null;
    let isWorking = false;

    // Configure marked for safe rendering
    marked.setOptions({ breaks: true, gfm: true });

    const socket = io({
        path: window.location.pathname.replace(/\/chat\/.*$/, '') + '/socket.io',
        query: { api_key: apiKey },
        reconnection: true,
    });

    socket.on('connected', (data) => {
        csrfToken = data.csrf_token;
        socket.emit('acp_subscribe', { csrf_token: csrfToken, session_id: sessionId, history_offset: historyOffset });
    });

    // Notify parent on any click so it can focus this pane
    document.addEventListener('mousedown', () => {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'acp-chat-focus', sessionId: sessionId }, '*');
        }
    });

    function setStatus(state, text) {
        document.getElementById('status').className = 'status ' + state;
        document.getElementById('statusText').textContent = text;
        const input = document.getElementById('input');
        const btn = document.getElementById('sendBtn');
        if (state === 'ready') {
            input.disabled = false;
            btn.classList.remove('disabled');
            btn.textContent = 'Send';
            btn.onclick = sendMessage;
            btn.style.background = '';
            btn.style.borderColor = '';
        } else if (state === 'working') {
            btn.classList.remove('disabled');
            btn.textContent = 'Stop';
            btn.onclick = stopGeneration;
            btn.style.background = '#a03030';
            btn.style.borderColor = '#511414';
        } else if (state === 'error') {
            input.disabled = true;
            btn.classList.add('disabled');
            btn.textContent = 'Send';
            btn.onclick = sendMessage;
            btn.style.background = '';
        }
    }

    let _stopClicks = [];
    document.getElementById('sendBtn').addEventListener('pointerdown', function(e) {
        if (this.textContent !== 'Stop') return;
        e.preventDefault();
        const now = Date.now();
        _stopClicks.push(now);
        _stopClicks = _stopClicks.filter(t => now - t < 5000);
        if (_stopClicks.length >= 3) {
            _stopClicks = [];
            setStatus('working', 'Force stopping...');
            socket.emit('acp_force_unstick', { csrf_token: csrfToken, session_id: sessionId });
            return;
        }
    });
    function stopGeneration() {
        document.getElementById('sendBtn').blur();
        if (!isWorking) return;
        socket.emit('acp_cancel', { csrf_token: csrfToken, session_id: sessionId });
    }

    // Stall detection: if no acp_event for 90s while working, show diagnostic info
    let stallTimer = null;
    let stallCount = 0;
    function resetStallTimer() {
        stallCount = 0;
        if (stallTimer) clearInterval(stallTimer);
        stallTimer = null;
        if (isWorking) {
            stallTimer = setInterval(() => {
                stallCount++;
                const secs = stallCount * 30;
                if (secs >= 90) {
                    socket.emit('acp_stall_info', { csrf_token: csrfToken, session_id: sessionId });
                }
            }, 30000);
        }
    }

    socket.on('acp_stall_info', (data) => {
        if (data.session_id !== sessionId) return;
        const ago = Math.round(data.last_activity_secs_ago);
        const statusEl = document.getElementById('statusText');
        if (ago > 90 && isWorking) {
            statusEl.innerHTML = `Stalled (${ago}s no data, proc=${data.proc_alive ? 'alive' : 'dead'}) ` +
                `<a href="#" onclick="forceUnstick();return false" style="color:#f44747;text-decoration:underline">Force restart</a>`;
        }
    });

    function forceUnstick() {
        if (!confirm("Kill the stuck kiro-cli process and reload the session? The agent's last partial response will be lost.")) return;
        setStatus('working', 'Restarting agent...');
        socket.emit('acp_force_unstick', { csrf_token: csrfToken, session_id: sessionId });
    }

    let currentAssistantMsg = null;
    let currentText = '';
    let currentContentDiv = null;
    let toolCalls = {};
    let userMsgCount = 0;
    let historyOffset = 0;
    let expectedSeq = -1;  // -1 = not yet synced, accept everything
    let seqBuffer = {};    // seq -> data, for out-of-order events

    function ensureAssistantMsg() {
        if (!currentAssistantMsg) {
            currentText = '';
            currentContentDiv = null;
            currentAssistantMsg = document.createElement('div');
            currentAssistantMsg.className = 'msg assistant';
            const label = document.createElement('div');
            label.className = 'msg-label';
            label.textContent = 'Fernando';
            currentAssistantMsg.appendChild(label);
            document.getElementById('messages').appendChild(currentAssistantMsg);
        }
        return currentAssistantMsg;
    }

    function ensureContentDiv() {
        ensureAssistantMsg();
        if (!currentContentDiv) {
            currentText = '';
            currentContentDiv = document.createElement('div');
            currentContentDiv.className = 'msg-content';
            currentAssistantMsg.appendChild(currentContentDiv);
        }
        return currentContentDiv;
    }

    let _chunkRenderPending = false;
    function _renderCurrentChunk() {
        _chunkRenderPending = false;
        if (!currentContentDiv) return;
        let html = marked.parse(currentText);
        html = html.replace(/src="\/home\/fernando\/(.*?)"/g, 'src="/api/files/$1?api_key=' + apiKey + '&session=' + sessionId + '"');
        html = html.replace(/src="\/tmp\/(.*?)"/g, 'src="/api/files/tmp/$1?api_key=' + apiKey + '&session=' + sessionId + '"');
        html = html.replace(/!\[([^\]]*)\]\((\/home\/fernando\/[^)]+)\)/g,
            (m, alt, path) => `<img alt="${alt}" src="/api/files/${path.replace('/home/fernando/', '')}?api_key=${apiKey}&session=${sessionId}">`);
        html = html.replace(/!\[([^\]]*)\]\((\/tmp\/[^)]+)\)/g,
            (m, alt, path) => `<img alt="${alt}" src="/api/files/tmp${path.slice(4)}?api_key=${apiKey}&session=${sessionId}">`);
        currentContentDiv.innerHTML = html;
        scrollToBottom();
    }
    function appendChunk(text) {
        ensureContentDiv();
        currentText += text;
        if (!_chunkRenderPending) {
            _chunkRenderPending = true;
            requestAnimationFrame(_renderCurrentChunk);
        }
    }

    function appendImage(data, mimeType) {
        ensureContentDiv();
        const img = document.createElement('img');
        img.src = 'data:' + (mimeType || 'image/png') + ';base64,' + data;
        img.style.cssText = 'max-width:100%;border-radius:4px;margin:6px 0';
        currentContentDiv.appendChild(img);
        scrollToBottom();
    }

    function extractFilePaths(rawInput) {
        if (!rawInput) return [];
        const input = typeof rawInput === 'object' ? rawInput : {};
        // Handle "paths" array (e.g. fs_read) or "path" string
        if (Array.isArray(input.paths)) return input.paths;
        if (typeof input.path === 'string') return [input.path];
        // Try nested in operations array
        if (Array.isArray(input.operations)) {
            return input.operations.map(o => o.path).filter(Boolean);
        }
        return [];
    }

    function fileUrl(filePath) {
        const stripped = filePath.replace(/^\/home\/fernando\//, '').replace(/^\/tmp\//, 'tmp/');
        return '/api/files/' + stripped + '?api_key=' + apiKey + '&session=' + sessionId;
    }

    const TOOL_SERVERS = {
        spawn_subagent:'fernando', get_subagent_status:'fernando', list_subagents:'fernando', terminate_subagent:'fernando', mutate:'fernando', reboot:'fernando',
        type_text:'desktop', press_key:'desktop', click_mouse:'desktop', open_application:'desktop', run_command:'desktop', screenshot:'desktop', scroll:'desktop', move_mouse:'desktop', drag_mouse:'desktop', get_mouse_position:'desktop', double_click:'desktop', right_click:'desktop', get_window_info:'desktop', focus_window:'desktop', get_screen_size:'desktop', set_screen_size:'desktop', get_clipboard:'desktop', set_clipboard:'desktop', desktop_exec:'desktop',
    };
    function toolDisplayName(title) {
        if (!title) return title;
        const server = TOOL_SERVERS[title] || (title.startsWith('microsoft_') ? 'microsoft' : null);
        return server ? '@' + server + '/' + title : title;
    }

    function addToolCall(toolCallId, title, status, rawInput) {
        ensureAssistantMsg();
        // Flush any pending text before sealing
        if (_chunkRenderPending) _renderCurrentChunk();
        // Seal current text so next text appears after this tool call
        currentContentDiv = null;
        currentText = '';
        const div = document.createElement('div');
        div.className = 'tool-call';

        const header = document.createElement('div');
        header.className = 'tool-call-header';

        const arrow = document.createElement('span');
        arrow.className = 'arrow';
        arrow.textContent = '▶';

        const nameSpan = document.createElement('span');
        nameSpan.className = 'tool-name';
        nameSpan.textContent = toolDisplayName(title) || toolCallId;

        const statusSpan = document.createElement('span');
        statusSpan.className = 'tool-status ' + (status || 'pending');
        statusSpan.textContent = status || 'pending';

        header.appendChild(arrow);
        header.appendChild(nameSpan);
        header.appendChild(statusSpan);

        const body = document.createElement('div');
        body.className = 'tool-call-body';

        const toggle = document.createElement('div');
        toggle.className = 'tool-toggle';
        toggle.textContent = '▸ show input';
        const tcState = { inputText: '', outputText: '', showingInput: false };
        toggle.addEventListener('click', (e) => {
            e.preventDefault();
            e.stopPropagation();
            tcState.showingInput = !tcState.showingInput;
            toggle.textContent = tcState.showingInput ? '▸ show output' : '▸ show input';
            bodyContent.textContent = tcState.showingInput ? (tcState.inputText || '(no input)') : (tcState.outputText || '(no output yet)');
        });

        const bodyContent = document.createElement('div');
        tcState.inputText = rawInput ? (typeof rawInput === 'string' ? rawInput : JSON.stringify(rawInput, null, 2)) : '';
        if (tcState.inputText) {
            bodyContent.textContent = tcState.inputText;
        }

        body.appendChild(toggle);
        body.appendChild(bodyContent);

        header.addEventListener('click', () => {
            arrow.classList.toggle('open');
            body.classList.toggle('open');
        });

        div.appendChild(header);
        div.appendChild(body);

        currentAssistantMsg.appendChild(div);

        // Show image previews for file read tools in an always-visible section
        const paths = extractFilePaths(rawInput);
        for (const p of paths) {
            if (IMAGE_EXTS.test(p)) {
                const preview = document.createElement('div');
                preview.className = 'tool-call-images';
                const img = document.createElement('img');
                img.src = fileUrl(p);
                img.style.cssText = 'max-width:100%;max-height:400px;border-radius:4px;display:block';
                preview.appendChild(img);
                div.appendChild(preview);
            }
        }

        toolCalls[toolCallId] = { div, statusSpan, body, bodyContent, tcState, title: title || '', rawInput };
        scrollToBottom();
    }

    const IMAGE_EXTS = /\.(png|jpg|jpeg|gif|webp|svg|bmp)$/i;

    function updateToolCall(toolCallId, status, content, rawOutput) {
        const tc = toolCalls[toolCallId];
        if (!tc) return;
        if (status) {
            tc.statusSpan.className = 'tool-status ' + status;
            tc.statusSpan.textContent = status;
        }
        if (content) {
            for (const c of content) {
                if (c.type === 'content' && c.content) {
                    if (c.content.type === 'text') {
                        tc.bodyContent.appendChild(document.createTextNode(c.content.text + '\n'));
                    }
                }
            }
        }
        if (rawOutput) {
            const text = typeof rawOutput === 'string' ? rawOutput : JSON.stringify(rawOutput, null, 2);
            tc.tcState.outputText = text;
            if (!tc.tcState.showingInput) {
                tc.bodyContent.textContent = text;
            }
        }
        if (status === 'completed' && tc.bodyContent.textContent.trim()) {
            const lines = tc.bodyContent.textContent.trim().split('\n');
            if (lines.length > 20) {
                const truncated = lines.slice(0, 20).join('\n') + '\n... (' + lines.length + ' lines total)';
                tc.bodyContent.textContent = truncated;
            }
        }
        scrollToBottom();
    }

    function finishTurn() {
        if (_chunkRenderPending) _renderCurrentChunk();
        for (const tc of Object.values(toolCalls)) {
            if (tc.statusSpan && tc.statusSpan.textContent !== 'completed') {
                tc.statusSpan.className = 'tool-status completed';
                tc.statusSpan.textContent = 'completed';
            }
        }
        currentAssistantMsg = null;
        currentContentDiv = null;
        currentText = '';
        toolCalls = {};
        isWorking = false;
        setStatus('ready', 'Ready');
        resetStallTimer();
    }

    function renderUserText(text) {
        // Split on fenced code blocks first
        const parts = text.split(/(```[\s\S]*?```)/g);
        return parts.map(part => {
            if (part.startsWith('```') && part.endsWith('```')) {
                const inner = part.slice(3, -3);
                const nl = inner.indexOf('\n');
                const lang = nl > -1 ? inner.slice(0, nl).trim() : '';
                const code = nl > -1 ? inner.slice(nl + 1) : inner;
                return '<pre><code' + (lang ? ' class="language-' + escapeHtml(lang) + '"' : '') + '>' + escapeHtml(code) + '</code></pre>';
            }
            // Handle blockquotes and inline backticks, escape everything else
            const rendered = part.split('\n').map(line => {
                const quoteMatch = line.match(/^(>{1,})\s?(.*)/);
                const inner = quoteMatch ? quoteMatch[2] : line;
                const inlineRendered = inner.split(/(`[^`]+`)/g).map(s => {
                    if (s.startsWith('`') && s.endsWith('`')) {
                        return '<code>' + escapeHtml(s.slice(1, -1)) + '</code>';
                    }
                    return escapeHtml(s);
                }).join('');
                return quoteMatch ? '<blockquote>' + inlineRendered + '</blockquote>' : inlineRendered;
            }).join('\n');
            // Remove newlines between/after blockquotes (pre-wrap would show them as extra gaps)
            return rendered.replace(/<\/blockquote>\n<blockquote>/g, '</blockquote><blockquote>')
                .replace(/<\/blockquote>\n/g, '</blockquote>');
        }).join('');
    }

    function escapeHtml(s) {
        const div = document.createElement('div');
        div.textContent = s;
        return div.innerHTML;
    }

    function scrollToBottom() {
        const m = document.getElementById('messages');
        m.scrollTop = m.scrollHeight;
    }

    function collapseCodeBlocks(container, maxLines) {
        container.querySelectorAll('pre code').forEach(code => {
            const lines = code.textContent.split('\n');
            if (lines.length <= maxLines) return;
            const pre = code.parentElement;
            const truncated = lines.slice(0, maxLines).join('\n');
            const full = code.textContent;
            code.textContent = truncated;
            const toggle = document.createElement('div');
            toggle.style.cssText = 'color:#569cd6;cursor:pointer;font-size:12px;margin-top:4px;font-family:sans-serif';
            toggle.textContent = '▶ Show all ' + lines.length + ' lines';
            let expanded = false;
            toggle.onclick = () => {
                expanded = !expanded;
                code.textContent = expanded ? full : truncated;
                toggle.textContent = expanded ? '▼ Collapse' : '▶ Show all ' + lines.length + ' lines';
            };
            pre.after(toggle);
        });
    }

    function addUserMessage(text, collapsed) {
        const el = document.createElement('div');
        el.className = 'msg user';
        const label = document.createElement('div');
        label.className = 'msg-label';
        label.textContent = 'You';
        el.appendChild(label);
        if (collapsed) {
            const preview = document.createElement('span');
            preview.style.cssText = 'color:#888;cursor:pointer';
            const lines = text.split('\n').length;
            preview.textContent = '▶ Context message (' + lines + ' lines)';
            const full = document.createElement('div');
            full.style.display = 'none';
            full.textContent = text;
            preview.onclick = () => {
                if (full.style.display === 'none') {
                    full.style.display = 'block';
                    preview.textContent = '▼ Context message (' + lines + ' lines)';
                } else {
                    full.style.display = 'none';
                    preview.textContent = '▶ Context message (' + lines + ' lines)';
                }
            };
            el.appendChild(preview);
            el.appendChild(full);
        } else {
            const content = document.createElement('div');
            content.className = 'msg-content';
            content.style.whiteSpace = 'pre-wrap';
            content.innerHTML = renderUserText(text);
            collapseCodeBlocks(content, 30);
            el.appendChild(content);
        }
        document.getElementById('messages').appendChild(el);
        scrollToBottom();
    }

    function addSystemMessage(text) {
        const el = document.createElement('div');
        el.className = 'msg system';
        el.textContent = '⟳ ' + text;
        document.getElementById('messages').appendChild(el);
        scrollToBottom();
    }

    function sendMessage() {
        document.getElementById('sendBtn').blur();
        const input = document.getElementById('input');
        let text = input.value.trim();
        if ((!text && attachedFiles.length === 0) || isWorking) return;

        if (attachedFiles.length > 0) {
            const filePaths = attachedFiles.map(f => f.path).join('\n');
            const prefix = `[Attached files - saved to disk, use tools to read them]\n${filePaths}\n\n`;
            text = prefix + text;
            attachedFiles = [];
            renderAttached();
        }

        addUserMessage(text);

        input.value = '';
        input.style.height = 'auto';
        localStorage.removeItem(draftKey);
        isWorking = true;
        setStatus('working', 'Thinking...');
        resetStallTimer();

        socket.emit('acp_prompt', {
            csrf_token: csrfToken,
            session_id: sessionId,
            text: text,
        });
        scrollToBottom();
    }

    socket.on('acp_event', (data) => {
        if (data.session_id !== sessionId) return;
        resetStallTimer();

        // Sequence-based reordering for live events
        if (data.seq !== undefined) {
            if (expectedSeq === -1) {
                // Not synced yet, buffer it
                console.warn('[acp] buffering seq', data.seq, '(not synced yet)');
                seqBuffer[data.seq] = data;
                return;
            }
            if (data.seq !== expectedSeq) {
                // Out of order — buffer and wait
                console.warn('[acp] out of order: got seq', data.seq, 'expected', expectedSeq, '- buffering');
                seqBuffer[data.seq] = data;
                // Safety: if buffer grows too large, we likely have a seq mismatch — reset
                if (Object.keys(seqBuffer).length > 50) {
                    console.error('[acp] seq buffer overflow — resetting. Expected:', expectedSeq, 'buffered:', Object.keys(seqBuffer).map(Number).sort((a,b)=>a-b).slice(0,5));
                    const sorted = Object.keys(seqBuffer).map(Number).sort((a, b) => a - b);
                    expectedSeq = sorted[0];
                    while (seqBuffer[expectedSeq]) {
                        processEvent(seqBuffer[expectedSeq]);
                        delete seqBuffer[expectedSeq];
                        expectedSeq++;
                    }
                }
                return;
            }
            // In order — process it and drain buffer
            processEvent(data);
            expectedSeq++;
            while (seqBuffer[expectedSeq]) {
                processEvent(seqBuffer[expectedSeq]);
                delete seqBuffer[expectedSeq];
                expectedSeq++;
            }
            return;
        }

        // Unsequenced events (history replay, synthetic)
        const evt = data.event;
        if (evt.type === 'sync_seq') {
            // Server tells us the next live seq to expect and actual history length
            console.log('[acp] sync_seq: expectedSeq=', evt.seq, 'history_length=', evt.history_length, 'buffered=', Object.keys(seqBuffer).length);
            expectedSeq = evt.seq;
            if (evt.history_length !== undefined) historyOffset = evt.history_length;
            while (seqBuffer[expectedSeq]) {
                processEvent(seqBuffer[expectedSeq]);
                delete seqBuffer[expectedSeq];
                expectedSeq++;
            }
            return;
        }
        processEvent(data);
    });

    function processEvent(data) {
        const evt = data.event;

        // Track history offset for reconnect — only for live (sequenced) events
        if (data.seq !== undefined && evt.type !== 'session_ready' && evt.type !== 'session_error' && evt.type !== 'session_ended' && evt.type !== 'sync_seq') {
            historyOffset++;
        }

        // Handle user prompt from our history
        if (evt.type === 'user_prompt' || evt.type === 'continuation') {
            if (currentAssistantMsg) finishTurn();
            if (evt.text && evt.text.startsWith('[CONTINUATION] ')) {
                addSystemMessage(evt.text.slice(15));
            } else {
                addUserMessage(evt.text);
            }
            return;
        }

        if (evt.type === 'session_ready') { finishTurn(); setStatus('ready', 'Ready'); return; }
        if (evt.type === 'session_error') { finishTurn(); setStatus('error', 'Error: ' + (evt.error || 'unknown')); return; }
        if (evt.type === 'session_ended') { finishTurn(); setStatus('error', 'Session ended'); return; }
        if (evt.type === 'archived_preview') { finishTurn(); setStatus('ready', 'Archived — read-only preview'); document.getElementById('chatInput').disabled = true; document.querySelector('.send-btn').disabled = true; return; }
        if (evt.type === 'acp_error') { finishTurn(); setStatus('error', 'Error: ' + (evt.error || 'unknown')); setTimeout(() => setStatus('ready', 'Ready'), 3000); return; }

        const update = (evt.params || {}).update || {};
        const su = update.sessionUpdate;

        // user_message_chunk from session/load replay
        if (su === 'user_message_chunk') {
            // End any in-progress assistant message
            if (currentAssistantMsg) finishTurn();
            const c = update.content;
            if (c && c.type === 'text') {
                if (c.text.startsWith('[CONTINUATION] ')) {
                    addSystemMessage(c.text.slice(15));
                } else {
                    userMsgCount++;
                    addUserMessage(c.text, userMsgCount === 1);
                }
            }
        } else if (su === 'agent_message_chunk') {
            setStatus('working', 'Responding...');
            const c = update.content;
            if (c && c.type === 'text') appendChunk(c.text);
            else if (c && c.type === 'image') appendImage(c.data, c.mimeType);
        } else if (su === 'tool_call') {
            setStatus('working', (update.title || 'Using tool') + '...');
            addToolCall(update.toolCallId, update.title, update.status, update.rawInput);
        } else if (su === 'tool_call_update') {
            const st = update.status || '';
            if (st === 'in_progress') setStatus('working', 'Running tool...');
            updateToolCall(update.toolCallId, update.status, update.content, update.rawOutput);
        }

        if (evt.result && evt.result.stopReason) {
            finishTurn();
        }
    }

    const input = document.getElementById('input');
    const draftKey = 'acp_draft_' + sessionId;
    let draftTimer = null;
    function saveDraft() {
        const v = input.value;
        if (v) localStorage.setItem(draftKey, v);
        else localStorage.removeItem(draftKey);
    }
    input.addEventListener('input', () => {
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
        clearTimeout(draftTimer);
        draftTimer = setTimeout(saveDraft, 2000);
    });
    // Restore draft on load
    const saved = localStorage.getItem(draftKey);
    if (saved) {
        input.value = saved;
        input.style.height = 'auto';
        input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    }
    const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !isIOS && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });

    let attachedFiles = []; // [{name, path}]

    async function handleFiles(fileList) {
        const indicator = document.getElementById('uploadingIndicator');
        indicator.style.display = '';
        for (const file of fileList) {
            indicator.textContent = 'Uploading ' + file.name + '...';
            const form = new FormData();
            form.append('file', file);
            try {
                const resp = await fetch('/api/upload', { method: 'POST', body: form, headers: { 'X-API-Key': apiKey } });
                const data = await resp.json();
                if (data.path) {
                    attachedFiles.push({ name: data.name, path: data.path });
                    renderAttached();
                }
            } catch(e) {
                console.error('Upload failed:', e);
            }
        }
        indicator.style.display = 'none';
        document.getElementById('fileInput').value = '';
    }

    function renderAttached() {
        const container = document.getElementById('attachedFiles');
        container.innerHTML = attachedFiles.map((f, i) =>
            `<span class="attached-file"><span class="name">${escapeHtml(f.name)}</span><span class="remove" data-idx="${i}">✕</span></span>`
        ).join('');
        container.querySelectorAll('.remove').forEach(el => {
            el.onclick = () => removeAttached(parseInt(el.dataset.idx));
        });
    }

    function removeAttached(idx) {
        attachedFiles.splice(idx, 1);
        renderAttached();
    }

    window.addEventListener('beforeunload', () => {
        if (window.parent !== window) {
            window.parent.postMessage({ type: 'acp-chat-closing', sessionId: sessionId }, '*');
        }
    });

    // iOS: throttle scroll speed when dragging text selection to prevent overshoot
    (function() {
        const msgs = document.querySelector('.messages');
        if (!msgs || !('ontouchstart' in window)) return;
        let selActive = false, lastScrollTop = 0, rafId = null;
        const MAX_SCROLL_PER_FRAME = 8;
        function clampScroll() {
            if (!selActive) return;
            const delta = msgs.scrollTop - lastScrollTop;
            if (Math.abs(delta) > MAX_SCROLL_PER_FRAME) {
                msgs.scrollTop = lastScrollTop + Math.sign(delta) * MAX_SCROLL_PER_FRAME;
            }
            lastScrollTop = msgs.scrollTop;
            rafId = requestAnimationFrame(clampScroll);
        }
        document.addEventListener('selectionchange', () => {
            const sel = window.getSelection();
            const hasSelection = sel && sel.toString().length > 0;
            if (hasSelection && !selActive) {
                selActive = true;
                lastScrollTop = msgs.scrollTop;
                rafId = requestAnimationFrame(clampScroll);
            } else if (!hasSelection && selActive) {
                selActive = false;
                if (rafId) cancelAnimationFrame(rafId);
            }
        });
        msgs.addEventListener('touchend', () => {
            setTimeout(() => {
                if (selActive && (!window.getSelection() || !window.getSelection().toString())) {
                    selActive = false;
                    if (rafId) cancelAnimationFrame(rafId);
                }
            }, 300);
        });
    })();
</script>
</body>
