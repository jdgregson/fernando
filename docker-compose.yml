services:
  fernando-desktop:
    container_name: fernando-desktop
    build:
      context: .
      dockerfile: Dockerfile.desktop
    ports:
      - "127.0.0.1:6901:6901"
    environment:
      - VNC_PW=${VNC_PW:-password}
      - KASM_PORT=6901
      - DISPLAY_WIDTH=1920
      - DISPLAY_HEIGHT=1080
      - VNC_RESIZE=scale
    volumes:
      - ./data/desktop:/home/kasm-user:rw
    shm_size: 512m
    restart: unless-stopped
    runtime: sysbox-runc
    devices:
      - /dev/fuse:/dev/fuse
      - /dev/loop-control:/dev/loop-control
      - /dev/loop0:/dev/loop0
      - /dev/loop1:/dev/loop1
      - /dev/loop2:/dev/loop2
      - /dev/loop3:/dev/loop3
      - /dev/loop4:/dev/loop4
      - /dev/loop5:/dev/loop5
      - /dev/loop6:/dev/loop6
      - /dev/loop7:/dev/loop7
    entrypoint: ["/sbin/init"]
    user: "0"

networks:
  default:
    ipam:
      config:
        - subnet: 172.25.0.0/24
          gateway: 172.25.0.1
